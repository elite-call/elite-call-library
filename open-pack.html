<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Call — Open a Pack</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Roboto+Slab:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="app/cards.css" />
<link rel="stylesheet" href="app/pack.css" />
<meta name="ext-resource-dependency" content="app/img/hail911-logo.jpg" data-resource-id="hail911" />
<meta name="ext-resource-dependency" content="app/img/elitecall-logo.png" data-resource-id="elitecallLogo" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: 'Oswald', sans-serif; color: #e9eefb; min-height: 100vh; overflow-x: hidden;
    background: radial-gradient(130% 90% at 50% -5%, #16335c 0%, #0a1730 48%, #050d1f 100%);
  }
  header.topbar { position: sticky; top: 0; z-index: 40; background: rgba(6,15,34,.82);
    backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,.08); }
  .topbar-in { max-width: 1320px; margin: 0 auto; padding: 14px 22px; display: flex; align-items: center; gap: 18px; }
  .brand { display: flex; align-items: center; gap: 12px; font-family: 'Anton', sans-serif;
    font-size: 20px; letter-spacing: .5px; text-transform: uppercase; }
  .brand img { height: 30px; width: auto; display: block; }
  .brand .divider { width: 1px; height: 24px; background: rgba(255,255,255,.18); }
  .brand .vault-word { color: var(--gold-lt); }
  nav.tabs { display: flex; gap: 4px; margin-left: 8px; }
  nav.tabs a { text-decoration: none; color: #b9c6e2; font-weight: 600; font-size: 14px;
    text-transform: uppercase; letter-spacing: 1px; padding: 8px 16px; border-radius: 8px; }
  nav.tabs a.active { background: linear-gradient(180deg, var(--gold-lt), var(--gold)); color: #0a1730; }
  nav.tabs a:not(.active):hover { background: rgba(255,255,255,.07); color: #fff; }

  #root { min-height: calc(100vh - 63px); display: grid; place-items: center; padding: 20px; }
</style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-in">
      <div class="brand"><img src="app/img/elitecall-logo.png" alt="Elite Call" /><span class="divider"></span><span class="vault-word">Card Vault</span></div>
      <nav class="tabs">
        <a href="index.html">Card Vault</a>
        <a href="open-pack.html" class="active">Open a Pack</a>
      </nav>
    </div>
  </header>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="app/agent_feed_data.js"></script>
  <script src="app/data.js"></script>
  <script src="app/baseset.js"></script>
  <script src="app/trellus.js"></script>
  <script type="text/babel" src="app/tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/cards.jsx"></script>
  <script type="text/babel" src="app/pack.jsx"></script>
</body>
</html>
