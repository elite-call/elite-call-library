<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<script>(function(){var s=localStorage.getItem('ec_theme');if(s&&s!=='aero'){location.replace('card-vault.html');}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Card Vault — Elite Call Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Nunito:wght@400;600;700;800;900&family=Roboto+Slab:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#c88010; --gold-lt:#f2c840;
    --red:#c2402f;
    --ink:#1a2e4a; --mut:#6a90b8;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:'Nunito',sans-serif;color:var(--ink);min-height:100vh;
    background:linear-gradient(170deg,#6ac8e8 0%,#9cddf5 12%,#c4eeff 26%,#ddf7ff 40%,#e8fff6 56%,#b8f0d8 72%,#7ed8b0 88%,#5cc8a0 100%) fixed;}
  a{color:inherit;text-decoration:none}

  /* Orbs */
  .orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(60px);z-index:0}
  @keyframes drift-a{0%,100%{transform:translate(0,0)}40%{transform:translate(28px,-18px)}70%{transform:translate(-16px,14px)}}
  @keyframes drift-b{0%,100%{transform:translate(0,0)}35%{transform:translate(-22px,26px)}68%{transform:translate(16px,-10px)}}
  .orb-a{width:500px;height:500px;top:-120px;left:-150px;background:radial-gradient(circle,rgba(255,255,255,.75),rgba(200,240,255,.12) 70%,transparent);animation:drift-a 20s ease-in-out infinite}
  .orb-b{width:360px;height:360px;top:35%;right:-80px;background:radial-gradient(circle,rgba(160,245,220,.68),rgba(100,210,180,.12) 65%,transparent);animation:drift-b 24s ease-in-out 4s infinite}
  .orb-c{width:300px;height:300px;bottom:10%;left:5%;background:radial-gradient(circle,rgba(255,255,255,.58),rgba(180,230,255,.1) 65%,transparent);animation:drift-a 18s ease-in-out 8s infinite}

  /* Nav */
  .topbar{position:sticky;top:0;z-index:40;
    background:rgba(255,255,255,.72);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(255,255,255,.88);
    box-shadow:0 2px 18px rgba(80,160,220,.1),inset 0 -1px 0 rgba(255,255,255,.6)}
  .topbar-in{max-width:1340px;margin:0 auto;padding:11px 26px;display:flex;align-items:center;gap:16px;position:relative;z-index:1}
  .brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .brand img{height:22px;object-fit:contain;opacity:.9}
  .nav-tabs{display:flex;gap:3px;margin-left:6px}
  .nav-tabs a{font-family:'Nunito';font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.8px;
    padding:6px 13px;border-radius:20px;color:#4a7090;transition:background .15s,color .15s}
  .nav-tabs a.active{background:linear-gradient(160deg,rgba(242,200,64,.92),rgba(200,128,16,.88));
    color:#5a2a00;box-shadow:0 2px 10px rgba(200,128,16,.35),inset 0 1px 0 rgba(255,255,255,.6)}
  .nav-tabs a:not(.active):hover{background:rgba(255,255,255,.6);color:#1a4a80}
  .topbar-spacer{flex:1}
  .pack-cta{font-family:'Nunito';font-weight:900;font-size:12px;letter-spacing:.5px;text-transform:uppercase;
    color:#5a2a00;background:linear-gradient(160deg,rgba(242,200,64,.92),rgba(200,128,16,.88));
    padding:8px 18px;border-radius:999px;border:1.5px solid rgba(255,255,255,.5);
    box-shadow:0 3px 12px rgba(200,128,16,.35),inset 0 1px 0 rgba(255,255,255,.6);white-space:nowrap}
  .pack-cta:hover{filter:brightness(1.07)}

  .wrap{max-width:1340px;margin:0 auto;padding:0 26px 90px;position:relative;z-index:1}

  /* Hero */
  .hero{padding:36px 0 6px}
  .wordmark{font-family:'Anton';font-size:clamp(34px,6.4vw,68px);line-height:.9;margin:0;
    text-transform:uppercase;letter-spacing:.5px;
    background:linear-gradient(160deg,#1a3a6a 0%,#1a60cc 45%,#2a90e0 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .wordmark em{font-style:normal;-webkit-text-fill-color:transparent;
    background:linear-gradient(160deg,#f2c840,#c88010);-webkit-background-clip:text;background-clip:text}
  .sub{margin:12px 0 0;color:var(--mut);max-width:520px;font-size:14px;line-height:1.5;font-weight:600}

  .headrow{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-top:22px;flex-wrap:wrap}
  .toggle{display:flex;gap:8px}
  .toggle button{font-family:'Nunito';cursor:pointer;font-weight:800;font-size:12px;text-transform:uppercase;
    letter-spacing:.8px;padding:10px 18px;border-radius:999px;
    border:1px solid rgba(160,200,240,.5);background:rgba(255,255,255,.55);color:#4a7090;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}
  .toggle button.active{background:linear-gradient(160deg,rgba(242,200,64,.92),rgba(200,128,16,.88));
    color:#5a2a00;border-color:transparent;box-shadow:0 2px 8px rgba(200,128,16,.3),inset 0 1px 0 rgba(255,255,255,.6)}
  .toggle button:not(.active):hover{background:rgba(255,255,255,.75);color:#1a4a80}

  .readout{display:flex;gap:30px}
  .stat-r{text-align:left}
  .stat-r .n{font-family:'Anton';font-size:34px;color:#1a60cc;line-height:.9}
  .stat-r .l{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--mut);margin-top:3px;font-weight:800}

  /* Controls */
  .controls{display:flex;flex-wrap:wrap;gap:12px 14px;align-items:center;margin:22px 0 8px;
    background:rgba(255,255,255,.62);border:1px solid rgba(255,255,255,.88);border-radius:16px;
    padding:14px 16px;backdrop-filter:blur(10px);box-shadow:inset 0 1px 0 rgba(255,255,255,.95)}
  .search{flex:1;min-width:220px;position:relative;display:flex;align-items:center}
  .search svg{position:absolute;left:13px;opacity:.4}
  .search input{width:100%;background:rgba(255,255,255,.65);border:1px solid rgba(160,205,245,.6);border-radius:10px;
    padding:11px 12px 11px 38px;color:#1a2e4a;font-family:inherit;font-size:13px;font-weight:600;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}
  .search input::placeholder{color:#8aaac8}
  .grp{display:flex;align-items:center;gap:8px}
  .grp>.cap{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:#8aaac8;font-weight:800}
  select{background:rgba(255,255,255,.65);border:1px solid rgba(160,205,245,.6);color:#1a2e4a;border-radius:9px;
    padding:10px 12px;font-family:inherit;font-size:12px;cursor:pointer;font-weight:600}
  .dir{width:38px;height:38px;border-radius:9px;border:1px solid rgba(160,205,245,.6);
    background:rgba(255,255,255,.65);color:#4a7090;cursor:pointer;font-size:15px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}
  .pill{font-family:'Nunito';font-weight:800;font-size:11px;letter-spacing:.6px;text-transform:uppercase;
    padding:7px 14px;border-radius:999px;border:1px solid rgba(160,200,240,.5);
    background:rgba(255,255,255,.55);color:#4a7090;cursor:pointer;white-space:nowrap;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}
  .pill[data-on="true"]{background:rgba(26,96,204,.12);border-color:rgba(26,96,204,.4);color:#1a60cc}
  .pill:hover{border-color:rgba(26,96,204,.4);background:rgba(255,255,255,.75)}

  .editline{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin:20px 0}
  .editline .e{font-size:12px;letter-spacing:1.4px;text-transform:uppercase;color:var(--mut);font-weight:700}
  .editline .e b{color:#1a2e4a;font-weight:800}
  .editline .note{font-size:12px;color:#8aaac8;font-style:italic;font-weight:600}
  .editline .note .st{color:#c88010;font-style:normal}

  /* Grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:40px 28px;justify-items:center}
  .empty{grid-column:1/-1;text-align:center;color:var(--mut);padding:80px 0;font-size:15px;font-weight:700}
  .loading{padding:70px 0;text-align:center;color:var(--mut);font-weight:700}
  .err{margin:0 0 20px;padding:14px 16px;border:1px solid rgba(196,64,47,.4);border-radius:12px;
    background:rgba(196,64,47,.08);color:#c2402f;font-size:13px}

  /* ---- Card shell ---- */
  @keyframes card-enter{
    from{opacity:0;transform:translateY(18px) scale(.97)}
    to{opacity:1;transform:none}
  }
  .card{width:300px;aspect-ratio:300/420;perspective:1400px;cursor:pointer;
    animation:card-enter .4s cubic-bezier(.2,.8,.25,1) both;
    animation-delay:calc(var(--ci,0)*22ms);
    transition:transform .22s ease}
  .card:hover{transform:translateY(-6px)}
  .flip{position:relative;width:100%;height:100%;
    transition:transform .65s cubic-bezier(.2,.8,.25,1);transform-style:preserve-3d}
  .card.flipped .flip{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;overflow:hidden;
    background:
      radial-gradient(ellipse 80% 50% at 40% 18%, rgba(255,255,255,.55) 0%, transparent 55%),
      linear-gradient(165deg,#c8e8f8 0%,#a0d4f0 30%,#78b8e8 65%,#5090c8 100%);
    border:1px solid rgba(255,255,255,.85);
    box-shadow:0 20px 50px -12px rgba(40,100,180,.35),0 4px 12px rgba(0,0,0,.1),inset 0 2px 0 rgba(255,255,255,.9)}
  .back{transform:rotateY(180deg)}
  .inner{position:absolute;inset:10px;border:1px solid rgba(255,255,255,.6);border-radius:11px;
    padding:11px 12px;display:flex;flex-direction:column;
    background:linear-gradient(180deg,rgba(255,255,255,.28),rgba(255,255,255,.08))}

  /* ---- Foil / shimmer ---- */
  @keyframes foil-sweep{
    0%,100%{background-position:0% 0%}
    50%{background-position:100% 100%}
  }
  .foil{position:absolute;inset:0;pointer-events:none;border-radius:16px;
    mix-blend-mode:screen;background-size:250% 250%;opacity:0}
  /* rank 4 — MVP gold shimmer */
  .card[data-rank="4"] .foil{
    background:linear-gradient(125deg,transparent 20%,rgba(255,220,120,.55) 45%,rgba(255,255,200,.38) 52%,transparent 72%);
    opacity:.75;animation:foil-sweep 5.5s ease-in-out infinite}
  .card[data-rank="4"] .face{border-color:var(--gold)}
  /* rank 5 — Elite prismatic rainbow */
  .card[data-rank="5"] .foil{
    background:linear-gradient(120deg,
      rgba(255,80,120,.45),rgba(255,210,90,.45),rgba(120,255,170,.4),
      rgba(90,200,255,.4),rgba(190,120,255,.4));
    opacity:.82;animation:foil-sweep 5s ease-in-out infinite}
  .card[data-rank="5"] .face{border-color:var(--gold-lt);
    box-shadow:0 22px 46px -14px rgba(4,10,26,.75),0 0 28px -8px rgba(242,207,107,.18),
      inset 0 0 0 1px rgba(255,255,255,.06)}
  /* Mouse-reactive override — pauses animation, follows cursor */
  .card[data-rank="4"][data-foil-active="true"] .foil{
    animation:none;
    background:radial-gradient(ellipse 80% 60% at calc(var(--mx,.5)*100%) calc(var(--my,.5)*100%),
      rgba(255,240,150,.82),rgba(255,195,60,.55),transparent 65%);
    opacity:.88}
  .card[data-rank="5"][data-foil-active="true"] .foil{
    animation:none;
    background:radial-gradient(ellipse 90% 70% at calc(var(--mx,.5)*100%) calc(var(--my,.5)*100%),
      rgba(255,80,120,.68),rgba(255,210,90,.56),rgba(120,255,170,.5),
      rgba(90,200,255,.46),rgba(190,120,255,.56),transparent 70%);
    opacity:.92}

  /* ---- Card front elements ---- */
  .top{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .stars{font-size:12px;letter-spacing:1px}
  .stars .s{color:var(--gold)}.stars .o{color:rgba(80,130,180,.35)}
  .setbadge{font-family:'Anton';font-size:11px;letter-spacing:.6px;text-transform:uppercase;
    color:#0a1730;background:linear-gradient(180deg,var(--gold-lt),var(--gold));
    padding:3px 11px;border-radius:999px;border:1px solid rgba(0,0,0,.25);white-space:nowrap}
  .cardno{font-size:11px;font-weight:600;color:rgba(60,100,150,.55);letter-spacing:.3px}

  .portrait{position:relative;margin-top:9px;aspect-ratio:1/.82;border-radius:9px;overflow:hidden;
    border:1px solid rgba(255,255,255,.7);
    background:
      radial-gradient(rgba(255,255,255,.45) 1px, transparent 1.4px) 0 0/7px 7px,
      radial-gradient(ellipse 80% 60% at 38% 22%, rgba(255,255,255,.55) 0%, transparent 52%),
      radial-gradient(115% 120% at 50% 8%, #7ec8f0 0%, #4a9ad8 45%, #2a70b8 100%);
    background-color:#5aa0d0;
    box-shadow:inset 0 2px 8px rgba(255,255,255,.4)}
  .monogram{position:absolute;inset:0;display:grid;place-items:center;font-family:'Anton';
    font-size:74px;color:#fff;text-shadow:0 4px 16px rgba(20,80,160,.4),0 1px 0 rgba(255,255,255,.8);letter-spacing:1px}
  .teamtag{position:absolute;left:8px;bottom:8px;font-size:9px;font-weight:700;letter-spacing:1px;
    text-transform:uppercase;color:#fff;background:rgba(20,60,120,.55);backdrop-filter:blur(4px);
    padding:2px 8px;border-radius:5px;border:1px solid rgba(255,255,255,.4)}
  .cobadge{position:absolute;left:8px;top:8px;font-size:9px;font-weight:800;color:#fff;
    background:var(--red);padding:2px 7px;border-radius:5px;letter-spacing:.5px}
  .grade{position:absolute;right:8px;top:8px;text-align:center;
    background:rgba(255,255,255,.82);backdrop-filter:blur(6px);
    border:2px solid var(--gg,var(--gold));border-radius:8px;padding:3px 8px;min-width:40px;
    box-shadow:0 2px 8px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.95)}
  .grade .g{font-family:'Anton';font-size:20px;line-height:1;color:var(--gg,#c88010)}
  .grade .gl{font-size:6.5px;letter-spacing:1.4px;text-transform:uppercase;
    color:var(--gg,#c88010);opacity:.9}
  .wip{position:absolute;right:8px;top:8px;background:rgba(255,255,255,.82);backdrop-filter:blur(6px);
    border:1px dashed var(--gold);border-radius:7px;padding:4px 8px;text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.9)}
  .wip .g{font-family:'Anton';font-size:12px;color:#c88010;line-height:1}
  .wip .gl{font-size:6.5px;letter-spacing:1.2px;text-transform:uppercase;color:#a07020;margin-top:1px}

  .namebar{margin-top:10px;text-align:center;border-radius:8px;padding:7px 8px;
    border:1px solid rgba(255,255,255,.7);
    background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(220,240,255,.55));
    backdrop-filter:blur(6px);box-shadow:inset 0 1px 0 rgba(255,255,255,.95)}
  .name{font-family:'Anton';color:#1a3060;font-size:22px;line-height:1;letter-spacing:.5px;text-transform:uppercase;text-shadow:0 1px 0 rgba(255,255,255,.8)}

  .tiles{margin-top:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .tile{background:linear-gradient(180deg,rgba(255,255,255,.68),rgba(210,235,255,.45));
    border-radius:8px;padding:7px 3px 6px;text-align:center;
    border:1px solid rgba(255,255,255,.75);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.95),0 1px 4px rgba(40,100,180,.1)}
  .tile .v{font-family:'Anton';font-size:19px;line-height:1;color:#1a3a6e}
  .tile .v small{font-size:10px;opacity:.75}
  .tile .l{font-size:8px;letter-spacing:.5px;text-transform:uppercase;color:#6a90b8;margin-top:3px;font-weight:800}
  .tile.seecoach .v{font-size:11px;color:#c88010}
  .tile.muted .v{color:#8aaac8}

  .foot{margin-top:auto;padding-top:9px;display:flex;justify-content:space-between;align-items:center;
    border-top:1px solid rgba(255,255,255,.5);font-size:9px;letter-spacing:.6px;
    text-transform:uppercase;color:rgba(40,90,150,.6);font-weight:800}
  .foot .logo{display:flex;align-items:center;gap:6px;font-weight:800;color:#3a6090}
  .foot .logo .dot{width:14px;height:14px;border-radius:50%;
    background:
      radial-gradient(circle at 38% 30%,#dce4f0 0%,#8a9ab2 44%,#384866 100%) center/54% 54% no-repeat,
      conic-gradient(from 50deg,#1456b8 0deg,#5aaaf0 145deg,#1456b8 290deg,#07111f 290deg,#07111f 360deg);
    box-shadow:0 0 0 1px rgba(90,170,240,.5),0 0 5px -1px rgba(90,170,240,.35)}
  .foot .rar{font-weight:800;color:rgba(80,120,160,.6)}
  .card[data-rank="4"] .foot .rar{color:var(--gold)}
  .card[data-rank="5"] .foot .rar{color:#c88010}

  /* ---- Card back ---- */
  .back .inner{overflow-y:auto;scrollbar-width:thin}
  .bhead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .bname{font-family:'Anton';font-size:18px;text-transform:uppercase;color:#1a3060;line-height:1}
  .bsub{font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:#6a90b8;margin-top:3px;font-weight:700}
  .bovr{font-family:'Anton';font-size:26px;color:#1a60cc;line-height:1;text-align:right}
  .bovr small{display:block;font-size:7px;letter-spacing:1.4px;color:#6a90b8;font-weight:800}
  .sect{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#c88010;
    margin:11px 0 5px;font-weight:800;border-bottom:1px solid rgba(255,255,255,.5);padding-bottom:3px}
  .bar{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:10px}
  .bar .bl{width:66px;text-transform:uppercase;letter-spacing:.4px;color:#6a90b8;font-weight:700}
  .bar .bt{flex:1;height:6px;border-radius:4px;background:rgba(80,140,200,.15);overflow:hidden}
  .bar .bf{height:100%;background:linear-gradient(90deg,#4a9ff0,#1a60cc)}
  .bar .bn{width:46px;text-align:right;font-weight:800;color:#1a3060}
  .spark{display:flex;align-items:flex-end;gap:3px;height:34px;margin-top:4px}
  .spark span{flex:1;background:linear-gradient(180deg,#4a9ff0,#1a60cc);
    border-radius:2px 2px 0 0;opacity:.85;min-height:3px}
  .sg{font-size:10.5px;line-height:1.4;margin:4px 0;display:flex;gap:6px;color:#2a4a6e}
  .sg .m{color:#1a8050;font-weight:700}
  .sg .m.d{color:#c42028}
  .muted-note{font-size:10px;color:#8aaac8;font-style:italic;font-weight:600}

  /* ---- Sample Calls — upgraded call-player style ---- */
  .call-item{display:flex;gap:8px;align-items:flex-start;margin:5px 0;padding:7px 9px;
    border-radius:8px;background:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.75);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}
  .call-play{flex:0 0 auto;width:26px;height:26px;border-radius:50%;display:grid;
    place-items:center;font-size:9px;color:#fff;
    background:linear-gradient(180deg,#4a9ff0,#1a60cc);
    box-shadow:0 2px 8px rgba(26,96,204,.4),inset 0 1px 0 rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.6)}
  .call-body{flex:1;min-width:0}
  .call-top{display:flex;justify-content:space-between;align-items:baseline;gap:4px;margin-bottom:3px}
  .call-title{font-size:10px;font-weight:700;color:#1a3060;letter-spacing:.2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .call-dur{font-size:9px;color:#6a90b8;white-space:nowrap;flex-shrink:0;
    font-variant-numeric:tabular-nums;font-weight:700}
  .call-wave{display:flex;align-items:flex-end;gap:1.5px;height:14px;margin:3px 0}
  .call-wave span{flex:1;background:rgba(74,159,240,.35);border-radius:1px;min-height:2px}
  .call-foot{display:flex;justify-content:flex-end;margin-top:3px}
  .call-link{font-size:8px;letter-spacing:.8px;text-transform:uppercase;font-weight:800;
    color:#c88010;border:1px solid rgba(200,128,16,.4);border-radius:4px;
    padding:2px 8px;transition:background .12s}
  .call-link:hover{background:rgba(200,128,16,.1)}

  .card[data-graded="no"] .namebar{background:linear-gradient(180deg,rgba(240,248,255,.65),rgba(210,232,250,.45))}

  @media(max-width:560px){.readout{gap:20px}.stat-r .n{font-size:26px}
    .nav-tabs a{padding:6px 10px;font-size:11px}.pack-cta{display:none}}

  /* ---- Compare feature ---- */
  .card-wrap{position:relative}
  .card-wrap.cmp-sel .card{
    box-shadow:0 0 0 3px #1a60cc,0 20px 44px -12px rgba(40,100,180,.35),0 4px 12px rgba(0,0,0,.08)}
  .card-actions{position:absolute;top:8px;right:8px;z-index:5;
    display:flex;flex-direction:column;gap:5px;opacity:0;transition:opacity .15s;pointer-events:none}
  .card-wrap:hover .card-actions{opacity:1;pointer-events:auto}
  .cmp-btn{cursor:pointer;font-family:'Nunito';font-size:11px;font-weight:800;letter-spacing:.5px;

<script>
"use strict";

var FEED_URL='data/agent_feed.csv', ARCHIVE_URL='data/card_archive.csv';

/* ---- Six front tiles — Avg Talk replaced with Sched % ---- */
var STATS=[
  {key:'leadsPerHour',label:'Leads/Hr', get:function(r){return r.leads_per_hour},   kind:'num',    decimals:1, max:2.5},
  {key:'dials',       label:'Dials',    get:function(r){return r.di_dialed},         kind:'int',    max:900},
  {key:'sched',       label:'Sched %',  get:function(r){return r.percent_scheduled}, kind:'sched'},
  {key:'acc',         label:'ACC',      get:function(r){return r.acc_display},       kind:'accstr'},
  {key:'closeRate',   label:'Close %',  get:function(r){return r.di_conv_rate},      kind:'pct',    max:30},
  {key:'goldRate',    label:'Gold Rate',get:function(r){return r.gold_rate},         kind:'goldpct',max:5},
];
var WEIGHTS={leadsPerHour:.28,closeRate:.26,acc:.25,dials:.10,sched:.05,goldRate:.06};

/* ---- Cosmetic tiers ---- */
var TIERS=[
  {k:'rookie',  n:'Rookie',    stars:1,rank:1,w:46},
  {k:'starter', n:'Starter',   stars:2,rank:2,w:30},
  {k:'role',    n:'Role Player',stars:3,rank:3,w:15},
  {k:'mvp',     n:'MVP',       stars:4,rank:4,w:6},
  {k:'elite',   n:'Elite',     stars:5,rank:5,w:3}
];

function accNum(s){var m=String(s).match(/^(\d+(\.\d+)?)\s*%?$/);return m?+m[1]:null;}
function goldPct(v){if(v===''||v==null)return null;var n=+v;if(isNaN(n))return null;return n<=1?n*100:n;}

function scoreStat(s,r){
  if(s.kind==='accstr'){
    var raw=s.get(r);var sv=String(raw==null?'':raw).trim();
    if(!sv||sv==='—'||sv==='-')return null;
    if(sv==='see coach')return 30;
    var pv=sv.replace('%','');var n=+pv;if(isNaN(n))return null;
    return Math.max(0,Math.min(100,n<=1?n*100:n));
  }
  if(s.kind==='goldpct'){var g=goldPct(s.get(r));return g==null?null:Math.max(0,Math.min(100,g/s.max*100));}
  if(s.kind==='sched'){
    var sv2=String(s.get(r)||'').replace('%','').trim();
    var n2=parseFloat(sv2);
    return(isNaN(n2)||sv2==='-')?null:Math.min(100,n2);
  }
  var raw2=s.get(r);if(raw2===''||raw2==null)return null;
  var num=+raw2;if(isNaN(num))return null;
  if(s.kind==='sec')return Math.max(0,Math.round(100-(Math.abs(num-s.ideal)/s.spread)*100));
  return Math.max(0,Math.min(100,Math.round(num/s.max*100)));
}

function editionShort(s){
  if(!s)return'Elite Call';
  var m=s.match(/[A-Za-z]+/g);
  if(!m)return'Elite Call';
  var a=m[0].slice(0,3).toUpperCase();
  var b=m[m.length-1].slice(0,3).toUpperCase();
  return a===b?a:a+'–'+b;
}

function composite(r){var sum=0,w=0;STATS.forEach(function(s){var sc=scoreStat(s,r);if(sc==null)return;var ww=WEIGHTS[s.key]||0;sum+=sc*ww;w+=ww;});return w?Math.round(sum/w):0;}

function fmtStat(s,r){
  var raw=s.get(r);
  if(s.kind==='accstr'){
    var sv=String(raw==null?'':raw).trim();
    if(!sv||sv==='—'||sv==='-')return{v:'—',cls:'muted'};
    if(sv==='see coach')return{v:'see coach',cls:'seecoach'};
    /* defensive: raw decimal 0.84 → "84%" */
    var nc=+sv.replace('%','');
    if(!isNaN(nc)&&nc<=1&&sv.indexOf('%')<0)sv=Math.round(nc*100)+'%';
    return{v:sv,cls:''};
  }
  if(s.kind==='sched'){
    var sv2=String(raw==null?'':raw).trim();
    if(!sv2||sv2==='-'||sv2==='—')return{v:'—',cls:'muted'};
    /* add % if archived data stored raw number */
    if(sv2.indexOf('%')<0&&!isNaN(parseFloat(sv2)))sv2=Math.round(parseFloat(sv2))+'%';
    return{v:sv2,cls:''};
  }
  if(s.kind==='goldpct'){var g=goldPct(raw);return{v:g==null?'—':(Math.round(g*10)/10)+'%',cls:g==null?'muted':''};}
  if(raw===''||raw==null)return{v:'—',cls:'muted'};
  if(s.kind==='pct')return{v:Math.round(+raw)+'%',cls:''};
  if(s.kind==='int')return{v:Math.round(+raw),cls:''};
  return{v:(+raw).toFixed(s.decimals||0),cls:''};
}

function gradeLevel(c){
  return c>=90?['Gem','var(--gold-lt)']:c>=80?['Mint','#8fb0e0']:c>=68?['Fine','#d0a24e']:['Good','#9aa6b8'];
}

/* ---- Deterministic tier roll (stable per agent+period) ---- */
function hashStr(s){var h=2166136261>>>0;for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=(a+0x6D2B79F5)|0;var t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function rollTier(seed){
  var rnd=mulberry32(hashStr(String(seed)));
  var tot=TIERS.reduce(function(s,t){return s+t.w;},0),x=rnd()*tot;
  for(var i=0;i<TIERS.length;i++){x-=TIERS[i].w;if(x<0)return TIERS[i];}
  return TIERS[0];
}

/* ---- CSV parser ---- */
function parseCsv(text){
  var rows=[],row=[],f='',q=false;
  for(var i=0;i<text.length;i++){var c=text[i];
    if(q){if(c==='"'&&text[i+1]==='"'){f+='"';i++;}else if(c==='"')q=false;else f+=c;}
    else if(c==='"')q=true;
    else if(c===','){row.push(f);f='';}
    else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}
    else if(c!=='\r')f+=c;}
  if(f.length||row.length){row.push(f);rows.push(row);}
  var head=rows.shift().map(function(h){return h.trim();});
  return rows.filter(function(r){return r.length>1&&r.some(function(c){return c!=='';});})
    .map(function(r){var o={};head.forEach(function(h,i){o[h]=(r[i]||'').trim();});return o;});
}

/* ---- Waveform bars (decorative, seeded per call index) ---- */
var WAVE_HEIGHTS=[40,72,55,90,60,82,44,78,62,86,50,70,38,66,80];
function makeWave(ci){
  var bars='';var offset=ci*3;
  for(var i=0;i<10;i++){
    var h=WAVE_HEIGHTS[(i+offset)%WAVE_HEIGHTS.length];
    bars+='<span style="height:'+h+'%"></span>';
  }
  return '<div class="call-wave">'+bars+'</div>';
}

/* ---- STATE ---- */
var STATE={tab:'vault',feed:[],archive:[],periods:[],dir:-1,divOn:{},tierOn:{}};

/* ---- Build one card element ---- */
function card(r,cardNo,total,cellIdx){
  var name=r.display_name||'';
  var parts=name.split(/\s+/);
  var mono=((parts[0]||'')[0]||'')+((parts[parts.length-1]||'')[0]||'');
  var graded=(r.graded||'').toLowerCase()==='yes';
  var comp=composite(r);
  var tier=rollTier((r.agent_id||name)+'|'+(r.period_label||''));

  var el=document.createElement('div');
  el.className='card';
  el.dataset.rank=tier.rank;
  el.dataset.graded=graded?'yes':'no';
  el.style.setProperty('--ci',cellIdx||0);

  /* Mouse-reactive foil for MVP + Elite */
  if(tier.rank>=4){
    el.dataset.foilActive='false';
    el.addEventListener('mousemove',function(e){
      var rect=el.getBoundingClientRect();
      el.style.setProperty('--mx',((e.clientX-rect.left)/rect.width).toFixed(3));
      el.style.setProperty('--my',((e.clientY-rect.top)/rect.height).toFixed(3));
      el.dataset.foilActive='true';
    });
    el.addEventListener('mouseleave',function(){el.dataset.foilActive='false';});
  }

  /* Stars */
  var stars='';
  for(var i=1;i<=5;i++)stars+='<span class="'+(i<=tier.stars?'s':'o')+'">\u2605</span>';

  /* Stat tiles */
  var tiles=STATS.map(function(s){
    var f=fmtStat(s,r);
    return '<div class="tile '+f.cls+'"><div class="v">'+f.v+'</div><div class="l">'+s.label+'</div></div>';
  }).join('');

  /* Grade / WIP badge */
  var badge=graded
    ?(function(){var g=gradeLevel(comp);return '<div class="grade" style="--gg:'+g[1]+'"><div class="g">'+comp+'</div><div class="gl">'+g[0]+'</div></div>';})()
    :'<div class="wip"><div class="g">WK '+(r.period_week||'?')+'</div><div class="gl">In progress</div></div>';

  /* Front face */
  var front='<div class="face front"><div class="foil"></div><div class="inner">'+
    '<div class="top">'+
      '<span class="stars">'+stars+'</span>'+
      '<span class="setbadge">'+editionShort(r.period_label)+'</span>'+
      '<span class="cardno">#'+String(cardNo).padStart(3,'0')+' / '+String(total).padStart(3,'0')+'</span>'+
    '</div>'+
    '<div class="portrait">'+
      '<div class="monogram">'+mono.toUpperCase()+'</div>'+
      (r.company==='hail911'?'<span class="cobadge">HAIL911</span>':'')+
      (r.team?'<span class="teamtag">'+r.team+'</span>':'')+
      badge+
    '</div>'+
    '<div class="namebar"><div class="name">'+name+'</div></div>'+
    '<div class="tiles">'+tiles+'</div>'+
    '<div class="foot">'+
      '<span class="logo"><span class="dot"></span>Elite Call</span>'+
      '<span class="rar">'+tier.n+'</span>'+
    '</div>'+
    '</div></div>';

  /* Back — stat bars */
  var bars=STATS.map(function(s){
    var sc=scoreStat(s,r),f=fmtStat(s,r);
    return '<div class="bar">'+
      '<span class="bl">'+s.label+'</span>'+
      '<span class="bt"><span class="bf" style="width:'+(sc==null?0:sc)+'%"></span></span>'+
      '<span class="bn">'+f.v+'</span>'+
    '</div>';
  }).join('');

  /* Back — trend sparkline */
  var lph=(r.trend_lph||'').split('|').filter(function(x){return x!=='';}).map(Number);
  var tr=lph.length?lph:(r.trend||'').split('|').filter(function(x){return x!=='';}).map(Number);
  var spark=tr.length
    ?(function(){
        var mx=Math.max.apply(null,tr.concat([1]));
        return '<div class="spark">'+tr.map(function(v){return '<span style="height:'+Math.max(8,v/mx*100)+'%"></span>';}).join('')+'</div>';
      })()
    :'<div class="muted-note">No trend history yet.</div>';

  /* Back — sample calls (upgraded player style) */
  var samples=[];try{samples=JSON.parse(r.sample_calls||'[]');}catch(e){samples=[];}
  var calls=samples.length
    ?samples.slice(0,3).map(function(c,ci){
        var id=c.sid||c.id||c.session_id||'';
        var title=c.label||c.title||c.disposition||'Gold Call';
        var dur=+(c.dur||c.duration||0);
        var durFmt=dur?Math.floor(dur/60)+':'+String(Math.round(dur%60)).padStart(2,'0'):'';
        var link=id?'<a class="call-link" href="https://app.trellus.ai/transcripts?id='+encodeURIComponent(id)+'" target="_blank" rel="noopener">View \u2192</a>':'';
        return '<div class="call-item">'+
          '<div class="call-play">\u25b6</div>'+
          '<div class="call-body">'+
            '<div class="call-top"><span class="call-title">'+title+'</span><span class="call-dur">'+durFmt+'</span></div>'+
            makeWave(ci)+
            (link?'<div class="call-foot">'+link+'</div>':'')+
          '</div>'+
        '</div>';
      }).join('')
    :'<div class="muted-note">'+(r.company==='hail911'?'No sample calls for Hail911.':'No sample calls flagged this edition.')+'</div>';

  /* Back — QA */
  var praise=r.qa_latest_praise
    ?'<div class="sg"><span class="m">\u25b2</span><span>'+r.qa_latest_praise+'</span></div>'
    :'<div class="muted-note">'+(r.company==='hail911'?'No QA for Hail911 (by design).':'No recent praise logged.')+'</div>';
  var growth=r.qa_latest_coaching
    ?'<div class="sg"><span class="m d">\u25bc</span><span>'+r.qa_latest_coaching+'</span></div>'
    :'<div class="muted-note">\u2014</div>';

  var ovr=graded
    ?'<div class="bovr">'+comp+'<small>OVR</small></div>'
    :'<div class="bovr" style="color:#3e5270">\u2014<small>Ungraded</small></div>';

  var schedNote=(r.percent_scheduled&&r.percent_scheduled!=='-')?' \u00b7 Sched '+r.percent_scheduled:'';

  /* Back face */
  var back='<div class="face back"><div class="foil"></div><div class="inner">'+
    '<div class="bhead">'+
      '<div><div class="bname">'+name+'</div>'+
        '<div class="bsub">'+tier.n+' \u00b7 '+(r.team||'')+schedNote+'</div></div>'+
      ovr+
    '</div>'+
    '<div class="sect">Stat Breakdown</div>'+bars+
    '<div class="sect">Trend \u00b7 Leads / Hr</div>'+spark+
    '<div class="sect">Sample Calls \u00b7 via Trellus</div>'+calls+
    '<div class="sect">Strengths</div>'+praise+
    '<div class="sect">Growth Areas</div>'+growth+
  '</div></div>';

  el.innerHTML='<div class="flip">'+front+back+'</div>';

  /* Click to flip — but let link clicks pass through */
  el.addEventListener('click',function(e){
    if(e.target.closest('a'))return;
    el.classList.toggle('flipped');
  });

  return{el:el,tier:tier};
}

/* ---- Render grid ---- */
function activeRows(){
  if(STATE.tab==='vault')return STATE.feed;
  var p=document.getElementById('edition').value;
  return STATE.archive.filter(function(r){return r.period_label===p;});
}

function render(){
  var grid=document.getElementById('grid');grid.innerHTML='';
  var all=activeRows().slice();
  var q=(document.getElementById('q').value||'').toLowerCase();
  var sort=document.getElementById('sort').value,dir=STATE.dir;
  var divActive=Object.keys(STATE.divOn).filter(function(k){return STATE.divOn[k];});
  var tierActive=Object.keys(STATE.tierOn).filter(function(k){return STATE.tierOn[k];});

  /* stable card numbers (alphabetical across full edition) */
  all.sort(function(a,b){return(a.display_name||'').localeCompare(b.display_name||'');});
  var withNo=all.map(function(r,i){
    return{r:r,no:i+1,tier:rollTier((r.agent_id||r.display_name)+'|'+(r.period_label||''))};
  });
  var total=withNo.length;

  var rows=withNo.filter(function(x){
    if(q&&(x.r.display_name||'').toLowerCase().indexOf(q)<0)return false;
    if(divActive.length&&divActive.indexOf(x.r.team)<0)return false;
    if(tierActive.length&&tierActive.indexOf(x.tier.k)<0)return false;
    return true;
  });

  rows.sort(function(a,b){
    var A=a.r,B=b.r,v;
    if(sort==='name')v=(A.display_name||'').localeCompare(B.display_name||'');
    else if(sort==='leads')v=(+A.leads||0)-(+B.leads||0);
    else if(sort==='lph')v=(+A.leads_per_hour||0)-(+B.leads_per_hour||0);
    else if(sort==='close')v=(+A.di_conv_rate||0)-(+B.di_conv_rate||0);
    else v=composite(A)-composite(B);
    return sort==='name'?v*(dir===-1?1:-1):v*dir;
  });

  if(!rows.length){
    grid.innerHTML='<div class="empty">No cards match. Clear the search or filters.</div>';
  } else {
    rows.forEach(function(x,i){
      var result=card(x.r,x.no,total,i);
      var wrap=document.createElement('div');
      wrap.className='card-wrap';
      var agentId=x.r.agent_id||x.r.display_name||'';
      wrap.dataset.agentId=agentId;
      var cmpBtn=document.createElement('button');
      cmpBtn.className='cmp-btn';
      cmpBtn.dataset.on='false';
      cmpBtn.textContent='+ Compare';
      (function(row,tier){cmpBtn.onclick=function(e){e.stopPropagation();toggleCmp(row,tier);};})(x.r,result.tier);
      var actions=document.createElement('div');
      actions.className='card-actions';
      actions.appendChild(cmpBtn);
      wrap.appendChild(result.el);
      wrap.appendChild(actions);
      grid.appendChild(wrap);
    });
    updateCmpRings();
  }
  updateEditline(total);
  updateReadout();
}

function updateReadout(){
  var rows=activeRows();
  var chase=rows.filter(function(r){return rollTier((r.agent_id||r.display_name)+'|'+(r.period_label||'')).rank>=4;}).length;
  var divs={};rows.forEach(function(r){if(r.team)divs[r.team]=1;});
  var edLabel=STATE.tab==='vault'
    ?(STATE.feed[0]?(STATE.feed[0].graded==='yes'?'Graded':'Wk '+(STATE.feed[0].period_week||'?')+'/4'):'—')
    :(document.getElementById('edition').value?'Archived':'—');
  document.getElementById('readout').innerHTML=
    '<div class="stat-r"><div class="n">'+rows.length+'</div><div class="l">Cards</div></div>'+
    '<div class="stat-r"><div class="n">'+chase+'</div><div class="l">Chase Cards</div></div>'+
    '<div class="stat-r"><div class="n">'+Object.keys(divs).length+'</div><div class="l">Divisions</div></div>'+
    '<div class="stat-r"><div class="n" style="font-size:20px;padding-top:8px">'+edLabel+'</div><div class="l">Current<br>Edition</div></div>';
}

function updateEditline(total){
  var lbl,tag;
  if(STATE.tab==='vault'){
    lbl=STATE.feed[0]?STATE.feed[0].period_label:'';
    tag=(STATE.feed[0]&&STATE.feed[0].graded==='yes')?'Graded Edition':'Current Edition';
  } else {
    lbl=document.getElementById('edition').value||'';tag='Archived Edition';
  }
  document.getElementById('editline').innerHTML=
    '<span class="e"><b>'+total+'</b> cards \u00b7 <b>'+(lbl||'\u2014')+'</b> ('+tag+')</span>'+
    '<span class="note"><span class="st">\u2605</span> Rarity is determined by random chance \u2014 better stats earn better odds.</span>';
}

function toggleDir(){STATE.dir*=-1;document.getElementById('dir').textContent=STATE.dir===-1?'↓':'↑';render();}

function setTab(t){
  STATE.tab=t;
  document.getElementById('tab-vault').classList.toggle('active',t==='vault');
  document.getElementById('tab-archive').classList.toggle('active',t==='archive');
  document.getElementById('editionWrap').style.display=t==='archive'?'':'none';
  document.getElementById('sub').textContent=t==='vault'
    ?'Every rep, every edition — rendered as a collectible. Cards stay in progress until the four-week month closes and grades lock.'
    :'Completed editions, graded and locked. Pick an edition to browse.';
  render();
}

function buildPills(id,items,store,keyFn,labelFn){
  var box=document.getElementById(id);box.innerHTML='';
  items.forEach(function(it){
    var k=keyFn(it);var b=document.createElement('button');b.className='pill';b.dataset.on='false';
    b.textContent=labelFn(it);
    b.onclick=function(){store[k]=!store[k];b.dataset.on=store[k]?'true':'false';render();};
    box.appendChild(b);
  });
}

function populate(){
  var teams={};STATE.feed.concat(STATE.archive).forEach(function(r){if(r.team)teams[r.team]=1;});
  buildPills('divPills',Object.keys(teams).sort(),STATE.divOn,function(t){return t;},function(t){return t;});
  buildPills('tierPills',TIERS,STATE.tierOn,function(t){return t.k;},function(t){return t.n;});
  var seen=[];STATE.archive.forEach(function(r){if(r.period_label&&seen.indexOf(r.period_label)<0)seen.push(r.period_label);});
  STATE.periods=seen.reverse();
  var ed=document.getElementById('edition');ed.innerHTML='';
  STATE.periods.forEach(function(p){var o=document.createElement('option');o.value=p;o.textContent=p;ed.appendChild(o);});
}

/* ---- Compare feature ---- */
var CMP=[];
function toggleCmp(r,tier){
  var id=r.agent_id||r.display_name;
  var idx=-1;
  CMP.forEach(function(c,i){if((c.r.agent_id||c.r.display_name)===id)idx=i;});
  if(idx>=0){CMP.splice(idx,1);}
  else if(CMP.length<3){CMP.push({r:r,tier:tier});}
  updateCmpBar();updateCmpRings();
}
function updateCmpBar(){
  var bar=document.getElementById('cmpBar');
  var cnt=document.getElementById('cmpCount');
  if(CMP.length>=2){
    bar.style.display='';
    cnt.textContent=CMP.length+' card'+(CMP.length>1?'s':'')+' selected';
  } else {bar.style.display='none';}
}
function updateCmpRings(){
  document.querySelectorAll('.card-wrap').forEach(function(w){
    var id=w.dataset.agentId;
    var sel=CMP.some(function(c){return(c.r.agent_id||c.r.display_name)===id;});
    w.classList.toggle('cmp-sel',sel);
    var btn=w.querySelector('.cmp-btn');
    if(btn)btn.dataset.on=sel?'true':'false';
  });
}
function clearCompare(){CMP=[];updateCmpBar();updateCmpRings();}
function closeCompare(){document.getElementById('cmpOverlay').style.display='none';}
function openCompare(){
  var content=document.getElementById('cmpContent');
  var comps=CMP.map(function(c){return composite(c.r);});
  var best=Math.max.apply(null,comps);
  var heads=CMP.map(function(c,i){
    var comp=comps[i],g=gradeLevel(comp);
    return '<div class="cmp-head">'+
      '<div class="cmp-head-name">'+c.r.display_name+'</div>'+
      '<div class="cmp-head-tier">'+c.tier.n+(c.r.team?' &middot; '+c.r.team:'')+'</div>'+
      '<div class="cmp-head-ovr" style="color:'+g[1]+'">'+comp+'</div>'+
      '<div class="cmp-head-lbl">'+g[0]+'</div>'+
    '</div>';
  }).join('');
  var statRows=STATS.map(function(s){
    var vals=CMP.map(function(c){return{fmt:fmtStat(s,c.r),sc:scoreStat(s,c.r)||0};});
    var bestSc=Math.max.apply(null,vals.map(function(v){return v.sc;}));
    return '<tr>'+
      '<td class="cmp-stat-lbl">'+s.label+'</td>'+
      vals.map(function(v){
        return '<td class="'+(v.sc>=bestSc&&bestSc>0?'cmp-best':'')+'">'+v.fmt.v+'</td>';
      }).join('')+
    '</tr>';
  }).join('');
  var ovrRow='<tr class="cmp-ovr-row"><td>Overall</td>'+
    comps.map(function(c){
      return '<td class="'+(c>=best?'cmp-best':'')+'">'+c+'</td>';
    }).join('')+'</tr>';
  var headers='<th>Stat</th>'+CMP.map(function(c){
    return '<th>'+(c.r.display_name||'')+'</th>';
  }).join('');
  content.innerHTML=
    '<h2 class="cmp-title">Compare <em>'+CMP.length+' Cards</em></h2>'+
    '<div class="cmp-heads">'+heads+'</div>'+
    '<div class="cmp-table-wrap"><table class="cmp-table">'+
      '<thead><tr>'+headers+'</tr></thead>'+
      '<tbody>'+statRows+ovrRow+'</tbody>'+
    '</table></div>';
  document.getElementById('cmpOverlay').style.display='';
}

function fetchCsv(u){
  return fetch(u,{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error(u+' HTTP '+r.status);return r.text();})
    .then(parseCsv);
}

function boot(){
  Promise.allSettled([fetchCsv(FEED_URL),fetchCsv(ARCHIVE_URL)]).then(function(res){
    var ok=res[0].status==='fulfilled';
    STATE.feed=ok?res[0].value:[];
    STATE.archive=res[1].status==='fulfilled'?res[1].value:[];
    if(!ok){
      document.getElementById('msg').innerHTML=
        '<div class="err">Couldn\u2019t load <code>'+FEED_URL+'</code> ('+res[0].reason.message+
        '). Showing bundled sample data \u2014 this resolves once served from the repo.</div>';
      STATE.feed=SAMPLE;
    }
    populate();render();
  });
}
