<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Elite Call Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Roboto+Slab:wght@400;600&display=swap" rel="stylesheet">
<!--
  ELITE CALL LIBRARY — data-driven receiver, styled to the production look.
  Reads the CSVs the aggregator pushes:
     data/agent_feed.csv    -> current edition (period-to-date) cards
     data/card_archive.csv  -> completed editions (Archive)
  Falls back to a small embedded sample if the CSVs aren't reachable (file://).
  Rarity tiers are cosmetic (client-rolled); Design owns the final aesthetic pass.
-->
<style>
  :root{
    --navy-900:#0a1730; --navy-850:#0d1f3b; --navy-800:#12294c; --navy-700:#1a3a66; --navy-600:#24548f;
    --gold:#d8a72a; --gold-lt:#f2cf6b; --red:#c2402f;
    --line:rgba(255,255,255,.10); --ink:#e9eefb; --mut:#9fb0d0;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:'Oswald',sans-serif;color:var(--ink);min-height:100vh;
    background:radial-gradient(150% 110% at 50% -20%, #1a3a66 0%, #0c1d3a 48%, #060f22 100%);}
  a{color:inherit}
  .wrap{max-width:1340px;margin:0 auto;padding:0 26px 90px}

  /* ---------- header ---------- */
  .hero{padding:40px 0 6px}
  .wordmark{font-family:'Anton',sans-serif;font-size:clamp(34px,6.4vw,68px);line-height:.9;margin:0;
    text-transform:uppercase;letter-spacing:.5px;color:#f4f7ff}
  .wordmark em{font-style:normal;color:var(--gold-lt)}
  .sub{margin:12px 0 0;color:var(--mut);max-width:520px;font-size:15px;line-height:1.4}

  .headrow{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-top:22px;flex-wrap:wrap}
  .toggle{display:flex;gap:8px}
  .toggle button{font-family:'Oswald';cursor:pointer;font-weight:700;font-size:13px;text-transform:uppercase;
    letter-spacing:1.2px;padding:11px 20px;border-radius:9px;border:1px solid var(--line);background:transparent;color:#c3d0ec}
  .toggle button.active{background:linear-gradient(180deg,var(--gold-lt),var(--gold));color:#0a1730;border-color:transparent}
  .toggle button:not(.active):hover{border-color:rgba(255,255,255,.28);color:#fff}

  .readout{display:flex;gap:30px}
  .stat-r{text-align:left}
  .stat-r .n{font-family:'Anton';font-size:34px;color:var(--gold-lt);line-height:.9}
  .stat-r .l{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--mut);margin-top:3px}

  /* ---------- controls ---------- */
  .controls{display:flex;flex-wrap:wrap;gap:12px 14px;align-items:center;margin:22px 0 8px;
    background:rgba(9,20,44,.72);border:1px solid var(--line);border-radius:16px;padding:14px 16px}
  .search{flex:1;min-width:220px;position:relative;display:flex;align-items:center}
  .search svg{position:absolute;left:13px;opacity:.5}
  .search input{width:100%;background:rgba(0,0,0,.32);border:1px solid var(--line);border-radius:10px;
    padding:11px 12px 11px 38px;color:#fff;font-family:inherit;font-size:14px}
  .search input::placeholder{color:#7d8eb0}
  .grp{display:flex;align-items:center;gap:8px}
  .grp>.cap{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:#8fa0c2}
  select{background:rgba(0,0,0,.32);border:1px solid var(--line);color:#fff;border-radius:9px;
    padding:10px 12px;font-family:inherit;font-size:13px;cursor:pointer}
  .dir{width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:rgba(0,0,0,.32);
    color:#cbd6ef;cursor:pointer;font-size:15px}
  .pill{font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.6px;text-transform:uppercase;
    padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.03);
    color:#c3d0ec;cursor:pointer;white-space:nowrap}
  .pill[data-on="true"]{background:linear-gradient(180deg,#20406e,#173257);border-color:var(--gold);color:#fff}
  .pill:hover{border-color:rgba(255,255,255,.3)}

  .editline{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin:20px 0 20px}
  .editline .e{font-size:12px;letter-spacing:1.4px;text-transform:uppercase;color:var(--mut)}
  .editline .e b{color:var(--gold-lt);font-weight:700}
  .editline .note{font-size:12px;color:#7f8fb0;font-style:italic}
  .editline .note .st{color:var(--gold);font-style:normal}

  /* ---------- grid + card ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:40px 28px;justify-items:center}
  .empty{grid-column:1/-1;text-align:center;color:var(--mut);padding:80px 0;font-size:15px}
  .loading{padding:70px 0;text-align:center;color:var(--mut)}
  .err{margin:0 0 20px;padding:14px 16px;border:1px solid var(--red);border-radius:12px;background:#241318;color:#f0b8ac;font-size:13px}

  .card{width:300px;aspect-ratio:300/420;perspective:1400px;cursor:pointer}
  .flip{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.2,.8,.25,1);transform-style:preserve-3d}
  .card.flipped .flip{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;overflow:hidden;
    background:linear-gradient(165deg,#1c3c68 0%,#122a4d 55%,#0c1f3c 100%);
    border:1px solid rgba(216,167,42,.28);
    box-shadow:0 22px 46px -14px rgba(4,10,26,.75), inset 0 0 0 1px rgba(255,255,255,.04)}
  .back{transform:rotateY(180deg)}
  .inner{position:absolute;inset:10px;border:1px solid rgba(255,255,255,.12);border-radius:11px;padding:11px 12px;
    display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(0,0,0,.10))}
  .foil{position:absolute;inset:0;pointer-events:none;mix-blend-mode:screen;opacity:0;border-radius:16px}
  .card[data-rank="4"] .foil{opacity:.55;background:linear-gradient(125deg,transparent 30%,rgba(242,207,107,.5) 50%,transparent 70%)}
  .card[data-rank="5"] .foil{opacity:.8;background:linear-gradient(120deg,rgba(255,120,150,.4),rgba(242,207,107,.55),rgba(120,220,255,.4),rgba(190,140,255,.4))}

  .top{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .stars{font-size:12px;letter-spacing:1px}
  .stars .s{color:var(--gold)}.stars .o{color:#3a4c6e}
  .setbadge{font-family:'Anton';font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:#0a1730;
    background:linear-gradient(180deg,var(--gold-lt),var(--gold));padding:3px 11px;border-radius:999px;
    border:1px solid rgba(0,0,0,.25);white-space:nowrap}
  .cardno{font-size:11px;font-weight:600;color:#aebbd8}

  .portrait{position:relative;margin-top:9px;aspect-ratio:1/.82;border-radius:9px;overflow:hidden;
    border:1px solid rgba(255,255,255,.10);
    background:
      radial-gradient(rgba(255,255,255,.10) 1px, transparent 1.4px) 0 0/7px 7px,
      radial-gradient(115% 120% at 50% 8%, #24548f 0%, #16335c 45%, #0d223f 100%),
      linear-gradient(160deg,#1c3c68,#0d223f);
    background-color:#12294c}
  .monogram{position:absolute;inset:0;display:grid;place-items:center;font-family:'Anton';font-size:74px;
    color:#f4f7ff;text-shadow:0 6px 18px rgba(0,0,0,.5);letter-spacing:1px}
  .teamtag{position:absolute;left:8px;bottom:8px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
    color:#fff;background:rgba(0,0,0,.5);padding:2px 8px;border-radius:5px;border:1px solid rgba(255,255,255,.12)}
  .cobadge{position:absolute;left:8px;top:8px;font-size:9px;font-weight:800;color:#fff;background:var(--red);
    padding:2px 7px;border-radius:5px;letter-spacing:.5px}
  .grade{position:absolute;right:8px;top:8px;text-align:center;background:rgba(6,13,28,.9);
    border:2px solid var(--gg,var(--gold));border-radius:8px;padding:3px 8px;min-width:40px}
  .grade .g{font-family:'Anton';font-size:20px;line-height:1;color:var(--gg,var(--gold))}
  .grade .gl{font-size:6.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gg,var(--gold));opacity:.9}
  .wip{position:absolute;right:8px;top:8px;background:rgba(6,13,28,.88);border:1px dashed var(--gold);border-radius:7px;
    padding:4px 8px;text-align:center}
  .wip .g{font-family:'Anton';font-size:12px;color:var(--gold-lt);line-height:1}
  .wip .gl{font-size:6.5px;letter-spacing:1.2px;text-transform:uppercase;color:#cbb06a;margin-top:1px}

  .namebar{margin-top:10px;text-align:center;border-radius:8px;
    padding:7px 8px;border:1px solid rgba(255,255,255,.08);
    background:linear-gradient(180deg,#0f2547,#0a1a34)}
  .name{font-family:'Anton';color:#fff;font-size:22px;line-height:1;letter-spacing:.5px;text-transform:uppercase}

  .tiles{margin-top:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .tile{background:linear-gradient(180deg,rgba(36,84,143,.35),rgba(10,26,52,.6));border-radius:8px;padding:7px 3px 6px;
    text-align:center;border:1px solid rgba(255,255,255,.08)}
  .tile .v{font-family:'Anton';font-size:19px;line-height:1;color:var(--gold-lt)}
  .tile .v small{font-size:10px;opacity:.8}
  .tile .l{font-size:8px;letter-spacing:.5px;text-transform:uppercase;color:#9fb0d0;margin-top:3px}
  .tile.seecoach .v{font-size:11px;color:var(--gold-lt)}
  .tile.muted .v{color:#8296b8}

  .foot{margin-top:auto;padding-top:9px;display:flex;justify-content:space-between;align-items:center;
    border-top:1px solid rgba(255,255,255,.08);font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:#9fb0d0}
  .foot .logo{display:flex;align-items:center;gap:6px;font-weight:700;color:#cdd8f2}
  .foot .logo .dot{width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,var(--navy-700) 62%);box-shadow:0 0 0 1.5px var(--gold)}
  .foot .rar{font-weight:700;color:var(--gold-lt)}

  /* back */
  .back .inner{overflow-y:auto}
  .bhead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .bname{font-family:'Anton';font-size:18px;text-transform:uppercase;color:#fff;line-height:1}
  .bsub{font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:var(--mut);margin-top:3px}
  .bovr{font-family:'Anton';font-size:26px;color:var(--gold-lt);line-height:1;text-align:right}
  .bovr small{display:block;font-size:7px;letter-spacing:1.4px;color:var(--mut)}
  .sect{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold);margin:11px 0 5px;font-weight:700;
    border-bottom:1px solid rgba(255,255,255,.10);padding-bottom:3px}
  .bar{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:10px}
  .bar .bl{width:66px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut)}
  .bar .bt{flex:1;height:6px;border-radius:4px;background:rgba(0,0,0,.35);overflow:hidden}
  .bar .bf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-lt))}
  .bar .bn{width:46px;text-align:right;font-weight:700;color:#dfe7fb}
  .spark{display:flex;align-items:flex-end;gap:3px;height:34px;margin-top:4px}
  .spark span{flex:1;background:linear-gradient(180deg,var(--gold-lt),var(--gold));border-radius:2px 2px 0 0;opacity:.9;min-height:3px}
  .sg{font-size:10.5px;line-height:1.4;margin:4px 0;display:flex;gap:6px;color:#dbe4f7}
  .sg .m{color:var(--gold);font-weight:700}
  .sg .m.d{color:var(--red)}
  .call{display:flex;justify-content:space-between;gap:6px;align-items:center;margin:4px 0;padding:5px 8px;border-radius:8px;
    background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);font-size:10px;color:#cdd8f2}
  .call a{color:var(--gold-lt);text-decoration:none;border:1px solid rgba(216,167,42,.5);border-radius:5px;padding:1px 6px;font-size:8.5px;text-transform:uppercase}
  .muted-note{font-size:10px;color:#7f8fb0;font-style:italic}

  .card[data-graded="no"] .namebar{background:linear-gradient(180deg,#2a3342,#1a2130)}

  @media (max-width:560px){ .readout{gap:20px} .stat-r .n{font-size:26px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1 class="wordmark">Elite Call <em>Library</em></h1>
    <p class="sub" id="sub">Every rep, every edition — rendered as a collectible. Each review period is its own edition; past months are archived, never erased.</p>

    <div class="headrow">
      <div class="toggle">
        <button id="tab-vault" class="active" onclick="setTab('vault')">Agent Cards</button>
        <button id="tab-archive" onclick="setTab('archive')">Archive</button>
      </div>
      <div class="readout" id="readout"></div>
    </div>
  </div>

  <div class="controls">
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9fb0d0" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="Search by name…" oninput="render()">
    </div>
    <div class="grp"><span class="cap">Sort</span>
      <select id="sort" onchange="render()">
        <option value="overall">Overall</option>
        <option value="leads">Leads</option>
        <option value="lph">Leads/Hour</option>
        <option value="close">Close Rate</option>
        <option value="name">Name</option>
      </select>
      <button class="dir" id="dir" title="Toggle direction" onclick="toggleDir()">↓</button>
    </div>
    <div class="grp" id="editionWrap" style="display:none"><span class="cap">Edition</span>
      <select id="edition" onchange="render()"></select></div>
    <div class="grp" id="tierWrap"><span class="cap">Tier</span><div class="grp" id="tierPills"></div></div>
    <div class="grp" id="divWrap"><span class="cap">Division</span><div class="grp" id="divPills"></div></div>
  </div>

  <div class="editline" id="editline"></div>
  <div id="msg"></div>
  <div class="grid" id="grid"><div class="loading">Loading the library…</div></div>
</div>

<script>
"use strict";

var FEED_URL='data/agent_feed.csv', ARCHIVE_URL='data/card_archive.csv';

/* six front tiles */
var STATS=[
  {key:'leadsPerHour',label:'Leads/Hour',get:r=>r.leads_per_hour,kind:'num',decimals:1,max:2.5},
  {key:'dials',       label:'Dials',     get:r=>r.di_dialed,      kind:'int',max:900},
  {key:'avgTalk',     label:'Avg Talk',  get:r=>r.di_avg_talk_sec,kind:'sec',ideal:90,spread:75},
  {key:'acc',         label:'ACC',       get:r=>r.acc_display,    kind:'accstr'},
  {key:'closeRate',   label:'Close Rate',get:r=>r.di_conv_rate,   kind:'pct',max:30},
  {key:'goldRate',    label:'Gold Rate', get:r=>r.gold_rate,      kind:'goldpct',max:5},
];
var WEIGHTS={leadsPerHour:.28,closeRate:.26,acc:.25,dials:.10,avgTalk:.05,goldRate:.06};

/* five cosmetic tiers (rarity not meaningful yet) */
var TIERS=[{k:'rookie',n:'Rookie',stars:1,rank:1,w:46},{k:'starter',n:'Starter',stars:2,rank:2,w:30},
  {k:'role',n:'Role Player',stars:3,rank:3,w:15},{k:'mvp',n:'MVP',stars:4,rank:4,w:6},{k:'elite',n:'Elite',stars:5,rank:5,w:3}];

function accNum(s){var m=String(s).match(/^(\d+(\.\d+)?)\s*%?$/);return m?+m[1]:null;}
function goldPct(v){if(v===''||v==null)return null;var n=+v;if(isNaN(n))return null;return n<=1?n*100:n;}
function scoreStat(s,r){
  if(s.kind==='accstr'){var a=accNum(s.get(r));return a==null?null:Math.max(0,Math.min(100,a));}
  if(s.kind==='goldpct'){var g=goldPct(s.get(r));return g==null?null:Math.max(0,Math.min(100,g/s.max*100));}
  var raw=+s.get(r);if(s.get(r)===''||s.get(r)==null||isNaN(raw))return null;
  if(s.kind==='sec')return Math.max(0,Math.round(100-(Math.abs(raw-s.ideal)/s.spread)*100));
  return Math.max(0,Math.min(100,Math.round(raw/s.max*100)));
}
function composite(r){var sum=0,w=0;STATS.forEach(function(s){var sc=scoreStat(s,r);if(sc==null)return;var ww=WEIGHTS[s.key]||0;sum+=sc*ww;w+=ww;});return w?Math.round(sum/w):0;}
function fmtStat(s,r){
  var raw=s.get(r);
  if(s.kind==='accstr')return{v:(raw===''||raw==null)?'\u2014':raw,cls:(raw==='see coach'?'seecoach':(raw==='-'||raw==='\u2014'?'muted':''))};
  if(s.kind==='goldpct'){var g=goldPct(raw);return{v:g==null?'\u2014':(Math.round(g*10)/10)+'%',cls:g==null?'muted':''};}
  if(raw===''||raw==null)return{v:'\u2014',cls:'muted'};
  if(s.kind==='sec'){var n=+raw||0;return{v:Math.floor(n/60)+':'+String(Math.round(n%60)).padStart(2,'0'),cls:''};}
  if(s.kind==='pct')return{v:Math.round(+raw)+'%',cls:''};
  if(s.kind==='int')return{v:Math.round(+raw),cls:''};
  return{v:(+raw).toFixed(s.decimals||0),cls:''};
}
function gradeLevel(c){return c>=90?['Gem','var(--gold-lt)']:c>=80?['Mint','#8fb0e0']:c>=68?['Fine','#d0a24e']:['Good','#9aa6b8'];}

/* deterministic tier roll */
function hashStr(s){var h=2166136261>>>0;for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=(a+0x6D2B79F5)|0;var t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function rollTier(seed){var rnd=mulberry32(hashStr(String(seed)));var tot=TIERS.reduce((s,t)=>s+t.w,0),x=rnd()*tot;for(var i=0;i<TIERS.length;i++){x-=TIERS[i].w;if(x<0)return TIERS[i];}return TIERS[0];}

/* csv */
function parseCsv(text){
  var rows=[],row=[],f='',q=false;
  for(var i=0;i<text.length;i++){var c=text[i];
    if(q){if(c==='"'&&text[i+1]==='"'){f+='"';i++;}else if(c==='"')q=false;else f+=c;}
    else if(c==='"')q=true;else if(c===','){row.push(f);f='';}
    else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}
    else if(c!=='\r')f+=c;}
  if(f.length||row.length){row.push(f);rows.push(row);}
  var head=rows.shift().map(h=>h.trim());
  return rows.filter(r=>r.length>1&&r.some(c=>c!==''))
    .map(function(r){var o={};head.forEach((h,i)=>o[h]=(r[i]||'').trim());return o;});
}

var STATE={tab:'vault',feed:[],archive:[],periods:[],dir:-1,divOn:{},tierOn:{}};

function card(r,cardNo,total){
  var name=r.display_name||'',p=name.split(/\s+/),mono=((p[0]||'')[0]||'')+((p[p.length-1]||'')[0]||'');
  var graded=(r.graded||'').toLowerCase()==='yes',comp=composite(r);
  var tier=rollTier((r.agent_id||name)+'|'+(r.period_label||''));
  var el=document.createElement('div');el.className='card';el.dataset.rank=tier.rank;el.dataset.graded=graded?'yes':'no';
  var stars='';for(var i=1;i<=5;i++)stars+='<span class="'+(i<=tier.stars?'s':'o')+'">\u2605</span>';
  var tiles=STATS.map(function(s){var f=fmtStat(s,r);return '<div class="tile '+f.cls+'"><div class="v">'+f.v+'</div><div class="l">'+s.label+'</div></div>';}).join('');
  var badge=graded?(function(){var g=gradeLevel(comp);return '<div class="grade" style="--gg:'+g[1]+'"><div class="g">'+comp+'</div><div class="gl">'+g[0]+'</div></div>';})()
    :'<div class="wip"><div class="g">WK '+(r.period_week||'?')+'</div><div class="gl">In progress</div></div>';
  var front='<div class="face front"><div class="foil"></div><div class="inner">'+
    '<div class="top"><span class="stars">'+stars+'</span><span class="setbadge">Elite Call</span>'+
      '<span class="cardno">#'+String(cardNo).padStart(3,'0')+' / '+String(total).padStart(3,'0')+'</span></div>'+
    '<div class="portrait"><div class="monogram">'+mono.toUpperCase()+'</div>'+
      (r.company==='hail911'?'<span class="cobadge">HAIL911</span>':'')+
      (r.team?'<span class="teamtag">'+r.team+'</span>':'')+badge+'</div>'+
    '<div class="namebar"><div class="name">'+name+'</div></div>'+
    '<div class="tiles">'+tiles+'</div>'+
    '<div class="foot"><span class="logo"><span class="dot"></span>Elite Call</span>'+
      '<span class="rar">'+tier.n+'</span></div>'+
    '</div></div>';
  var bars=STATS.map(function(s){var sc=scoreStat(s,r),f=fmtStat(s,r);
    return '<div class="bar"><span class="bl">'+s.label+'</span><span class="bt"><span class="bf" style="width:'+(sc==null?0:sc)+'%"></span></span><span class="bn">'+f.v+'</span></div>';}).join('');
  var lph=(r.trend_lph||'').split('|').filter(x=>x!=='').map(Number);
  var leadsTrend=(r.trend||'').split('|').filter(x=>x!=='').map(Number);
  var tr=lph.length?lph:leadsTrend;
  var spark=tr.length?(function(){var mx=Math.max.apply(null,tr.concat([1]));
    return '<div class="spark">'+tr.map(v=>'<span style="height:'+Math.max(8,v/mx*100)+'%"></span>').join('')+'</div>';})()
    :'<div class="muted-note">No trend history yet.</div>';
  var samples=[];try{samples=JSON.parse(r.sample_calls||'[]');}catch(e){samples=[];}
  var calls=samples.length?samples.slice(0,3).map(function(c){
      var id=c.id||c.session_id||'',title=c.title||c.disposition||'Call',dur=c.duration||c.dur||'';
      var link=id?'<a href="https://app.trellus.ai/transcripts?id='+encodeURIComponent(id)+'" target="_blank" rel="noopener">Open</a>':'';
      return '<div class="call"><span>'+title+(dur?' · '+dur:'')+'</span>'+link+'</div>';}).join('')
    :'<div class="muted-note">'+(r.company==='hail911'?'No sample calls for Hail911.':'No sample calls flagged this edition.')+'</div>';
  var praise=r.qa_latest_praise?('<div class="sg"><span class="m">\u25b2</span><span>'+r.qa_latest_praise+'</span></div>')
    :'<div class="muted-note">'+(r.company==='hail911'?'No QA for Hail911 (by design).':'No recent praise logged.')+'</div>';
  var growth=r.qa_latest_coaching?('<div class="sg"><span class="m d">\u25bc</span><span>'+r.qa_latest_coaching+'</span></div>'):'<div class="muted-note">\u2014</div>';
  var ovr=graded?('<div class="bovr">'+comp+'<small>OVR</small></div>'):('<div class="bovr" style="color:#8296b8">\u2014<small>Ungraded</small></div>');
  var back='<div class="face back"><div class="foil"></div><div class="inner">'+
    '<div class="bhead"><div><div class="bname">'+name+'</div><div class="bsub">'+tier.n+' · '+(r.team||'')+(r.percent_scheduled?' · Sched '+r.percent_scheduled:'')+'</div></div>'+ovr+'</div>'+
    '<div class="sect">Stat Breakdown</div>'+bars+
    '<div class="sect">Trend · Leads/Hour</div>'+spark+
    '<div class="sect">Sample Calls · via Trellus</div>'+calls+
    '<div class="sect">Strengths</div>'+praise+
    '<div class="sect">Growth Areas</div>'+growth+'</div></div>';
  el.innerHTML='<div class="flip">'+front+back+'</div>';
  el.addEventListener('click',()=>el.classList.toggle('flipped'));
  return {el:el,tier:tier};
}

function activeRows(){
  if(STATE.tab==='vault')return STATE.feed;
  var p=document.getElementById('edition').value;
  return STATE.archive.filter(r=>r.period_label===p);
}
function render(){
  var grid=document.getElementById('grid');grid.innerHTML='';
  var all=activeRows().slice();
  var q=(document.getElementById('q').value||'').toLowerCase();
  var sort=document.getElementById('sort').value,dir=STATE.dir;
  var divActive=Object.keys(STATE.divOn).filter(k=>STATE.divOn[k]);
  var tierActive=Object.keys(STATE.tierOn).filter(k=>STATE.tierOn[k]);
  // assign stable card numbers over the full edition, then filter for display
  all.sort((a,b)=>(a.display_name||'').localeCompare(b.display_name||''));
  var withNo=all.map((r,i)=>({r:r,no:i+1,tier:rollTier((r.agent_id||r.display_name)+'|'+(r.period_label||''))}));
  var total=withNo.length;
  var rows=withNo.filter(function(x){
    if(q&&(x.r.display_name||'').toLowerCase().indexOf(q)<0)return false;
    if(divActive.length&&divActive.indexOf(x.r.team)<0)return false;
    if(tierActive.length&&tierActive.indexOf(x.tier.k)<0)return false;
    return true;
  });
  rows.sort(function(a,b){var A=a.r,B=b.r,v;
    if(sort==='name')v=(A.display_name||'').localeCompare(B.display_name||'');
    else if(sort==='leads')v=(+A.leads||0)-(+B.leads||0);
    else if(sort==='lph')v=(+A.leads_per_hour||0)-(+B.leads_per_hour||0);
    else if(sort==='close')v=(+A.di_conv_rate||0)-(+B.di_conv_rate||0);
    else v=composite(A)-composite(B);
    return sort==='name'?v*(dir===-1?1:-1):v*dir;
  });
  if(!rows.length)grid.innerHTML='<div class="empty">No cards match. Clear the search or filters.</div>';
  else rows.forEach(function(x){grid.appendChild(card(x.r,x.no,total).el);});
  updateEditline(total);
  updateReadout();
}

function updateReadout(){
  var rows=activeRows();
  var chase=rows.filter(r=>rollTier((r.agent_id||r.display_name)+'|'+(r.period_label||'')).rank>=4).length;
  var divs={};rows.forEach(r=>{if(r.team)divs[r.team]=1;});
  var edLabel=STATE.tab==='vault'
    ? (STATE.feed[0]? (STATE.feed[0].graded==='yes'?'Graded':'Wk '+(STATE.feed[0].period_week||'?')+'/4') : '—')
    : (document.getElementById('edition').value?'Archived':'—');
  document.getElementById('readout').innerHTML=
    '<div class="stat-r"><div class="n">'+rows.length+'</div><div class="l">Cards</div></div>'+
    '<div class="stat-r"><div class="n">'+chase+'</div><div class="l">Chase Cards</div></div>'+
    '<div class="stat-r"><div class="n">'+Object.keys(divs).length+'</div><div class="l">Divisions</div></div>'+
    '<div class="stat-r"><div class="n" style="font-size:20px;padding-top:8px">'+edLabel+'</div><div class="l">Edition</div></div>';
}
function updateEditline(total){
  var lbl,tag;
  if(STATE.tab==='vault'){lbl=STATE.feed[0]?STATE.feed[0].period_label:'';tag=(STATE.feed[0]&&STATE.feed[0].graded==='yes')?'Graded Edition':'Current Edition';}
  else{lbl=document.getElementById('edition').value||'';tag='Archived Edition';}
  document.getElementById('editline').innerHTML=
    '<span class="e"><b>'+total+'</b> cards · <b>'+(lbl||'—')+'</b> ('+tag+')</span>'+
    '<span class="note"><span class="st">\u2605</span> Rarity is determined by random chance — better stats earn better odds.</span>';
}

function toggleDir(){STATE.dir*=-1;document.getElementById('dir').textContent=STATE.dir===-1?'↓':'↑';render();}
function setTab(t){
  STATE.tab=t;
  document.getElementById('tab-vault').classList.toggle('active',t==='vault');
  document.getElementById('tab-archive').classList.toggle('active',t==='archive');
  document.getElementById('editionWrap').style.display=t==='archive'?'':'none';
  document.getElementById('sub').textContent=t==='vault'
    ? 'Every rep, every edition — rendered as a collectible. Cards stay in progress until the four-week month closes and grades lock.'
    : 'Completed editions, graded and locked. Pick an edition to browse.';
  render();
}

function buildPills(id,items,store,keyFn,labelFn){
  var box=document.getElementById(id);box.innerHTML='';
  items.forEach(function(it){var k=keyFn(it);var b=document.createElement('button');b.className='pill';b.dataset.on='false';
    b.textContent=labelFn(it);b.onclick=function(){store[k]=!store[k];b.dataset.on=store[k]?'true':'false';render();};box.appendChild(b);});
}
function populate(){
  var teams={};STATE.feed.concat(STATE.archive).forEach(r=>{if(r.team)teams[r.team]=1;});
  buildPills('divPills',Object.keys(teams).sort(),STATE.divOn,t=>t,t=>t);
  buildPills('tierPills',TIERS,STATE.tierOn,t=>t.k,t=>t.n);
  var seen=[];STATE.archive.forEach(r=>{if(r.period_label&&seen.indexOf(r.period_label)<0)seen.push(r.period_label);});
  STATE.periods=seen.reverse();
  var ed=document.getElementById('edition');ed.innerHTML='';
  STATE.periods.forEach(p=>{var o=document.createElement('option');o.value=p;o.textContent=p;ed.appendChild(o);});
}

function fetchCsv(u){return fetch(u,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(u+' HTTP '+r.status);return r.text();}).then(parseCsv);}
function boot(){
  Promise.allSettled([fetchCsv(FEED_URL),fetchCsv(ARCHIVE_URL)]).then(function(res){
    var ok=res[0].status==='fulfilled';
    STATE.feed=ok?res[0].value:[];STATE.archive=res[1].status==='fulfilled'?res[1].value:[];
    if(!ok){document.getElementById('msg').innerHTML='<div class="err">Couldn\u2019t load <code>'+FEED_URL+'</code> ('+res[0].reason.message+'). Showing bundled sample data — this resolves once the page is served from the repo where the aggregator pushes the CSVs.</div>';STATE.feed=SAMPLE;}
    populate();render();
  });
}
