<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Call — Card Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Roboto+Slab:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="cards.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: 'Oswald', sans-serif;
    background: radial-gradient(140% 100% at 50% -10%, #16335c 0%, #0a1730 45%, #060f22 100%);
    color: #e9eefb; min-height: 100vh;
  }
  .wrap { max-width: 1320px; margin: 0 auto; padding: 0 22px 80px; }
  header.topbar { position: sticky; top: 0; z-index: 40; background: rgba(6,15,34,.82); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,.08); }
  .topbar-in { max-width: 1320px; margin: 0 auto; padding: 14px 22px; display: flex; align-items: center; gap: 18px; }
  .brand { display: flex; align-items: center; gap: 12px; font-family: 'Anton', sans-serif; font-size: 20px; letter-spacing: .5px; text-transform: uppercase; }
  .brand img { height: 30px; width: auto; display: block; }
  .brand .divider { width: 1px; height: 24px; background: rgba(255,255,255,.18); }
  .brand .vault-word { color: var(--gold-lt); }
  nav.tabs { display: flex; gap: 4px; margin-left: 8px; }
  nav.tabs a { text-decoration: none; color: #b9c6e2; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; padding: 8px 16px; border-radius: 8px; }
  nav.tabs a.active { background: linear-gradient(180deg, var(--gold-lt), var(--gold)); color: #0a1730; }
  nav.tabs a:not(.active):hover { background: rgba(255,255,255,.07); color: #fff; }
  .spacer { flex: 1; }
  .pack-cta { text-decoration: none; font-family:'Anton',sans-serif; text-transform: uppercase; letter-spacing: .5px; font-size: 14px; color: #0a1730; background: linear-gradient(180deg, #f3cf6b, #d8a72a); padding: 9px 18px; border-radius: 10px; border: 1.5px solid rgba(0,0,0,.25); box-shadow: 0 4px 14px -4px rgba(216,167,42,.7); }
  .pack-cta:hover { filter: brightness(1.06); }
  .hero { padding: 30px 0 18px; display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .hero h1 { font-family: 'Anton', sans-serif; font-size: clamp(34px, 5vw, 58px); margin: 0; line-height: .96; text-transform: uppercase; letter-spacing: .5px; }
  .hero h1 em { font-style: normal; color: var(--gold-lt); }
  .hero p { margin: 8px 0 0; color: #9fb0d0; max-width: 520px; font-size: 15px; }
  .period-switch { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .set-switch { display: inline-flex; margin-top: 18px; border: 1px solid rgba(255,255,255,.16); border-radius: 11px; overflow: hidden; }
  .set-btn { font-family: 'Anton', sans-serif; font-size: 14px; cursor: pointer; letter-spacing: .5px; text-transform: uppercase; padding: 9px 20px; background: transparent; color: #b9c6e2; border: none; }
  .set-btn[data-on="true"] { background: linear-gradient(180deg, var(--gold-lt), var(--gold)); color: #0a1730; }
  .set-btn:not([data-on="true"]):hover { background: rgba(255,255,255,.07); color: #fff; }
  .period-btn { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: .5px; padding: 8px 16px; border-radius: 9px; background: rgba(255,255,255,.05); color: #b9c6e2; border: 1px solid rgba(255,255,255,.14); }
  .period-btn[data-on="true"] { background: linear-gradient(180deg, var(--gold-lt), var(--gold)); color: #0a1730; border-color: transparent; }
  .period-btn:not([data-on="true"]):hover { background: rgba(255,255,255,.1); color: #fff; }
  .vault-stats { display: flex; gap: 26px; }
  .vault-stat .n { font-family:'Anton',sans-serif; font-size: 32px; color: var(--gold-lt); line-height: 1; }
  .vault-stat .l { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #8fa0c2; }
  .controls { position: sticky; top: 63px; z-index: 30; background: rgba(8,18,40,.9); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.09); border-radius: 14px; padding: 12px 14px; margin: 12px 0 26px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .search { flex: 1; min-width: 200px; position: relative; }
  .search input { width: 100%; background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.14); border-radius: 9px; padding: 10px 12px 10px 36px; color: #fff; font-family: inherit; font-size: 14px; }
  .search input::placeholder { color: #7d8eb0; }
  .search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: .55; }
  .ctl-group { display: flex; align-items: center; gap: 7px; }
  .ctl-group label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8fa0c2; }
  select.ec-select { background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.14); color: #fff; border-radius: 9px; padding: 9px 12px; font-family: inherit; font-size: 13px; cursor: pointer; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { font-size: 12px; letter-spacing: .5px; text-transform: uppercase; cursor: pointer; padding: 7px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.04); color: #c3d0ea; font-weight: 600; user-select: none; }
  .chip[data-on="true"] { background: linear-gradient(180deg, var(--gold-lt), var(--gold)); color: #0a1730; border-color: transparent; }
  .chip.dir { min-width: 34px; text-align: center; }
  .count-line { font-size: 12px; color: #8fa0c2; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(336px, 1fr)); gap: 38px 28px; justify-items: center; }
  @keyframes card-enter { from { opacity: 0; transform: translateY(22px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .card-cell { position: relative; transition: transform .2s ease; animation: card-enter .45s cubic-bezier(.2,.8,.25,1) both; animation-delay: calc(var(--ci, 0) * 28ms); }
  @media (prefers-reduced-motion: reduce) { .card-cell { animation: none; } }
  .card-cell:hover { transform: translateY(-7px); }
  .team-strip { position: absolute; top: 0; left: 8px; right: 8px; height: 3px; border-radius: 3px; z-index: 3; pointer-events: none; }
  .card-cell.cmp-selected .ec-card { box-shadow: 0 0 0 3px var(--gold), 0 18px 40px -12px rgba(5,12,28,.7); }
  .card-cell-actions { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 5px; z-index: 5; opacity: 0; transition: opacity .15s; }
  .card-cell:hover .card-cell-actions { opacity: 1; }
  .card-save, .card-cmp-btn { cursor: pointer; font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; padding: 6px 10px; border-radius: 7px; border: 1px solid rgba(255,255,255,.22); background: rgba(10,23,48,.88); backdrop-filter: blur(4px); transition: background .15s, color .15s; white-space: nowrap; }
  .card-save { color: #f3cf6b; }
  .card-save:hover { background: rgba(216,167,42,.9); color: #0a1730; border-color: transparent; }
  .card-cmp-btn { color: #b9c6e2; }
  .card-cmp-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
  .card-cmp-btn.active { background: var(--gold); color: #0a1730; border-color: transparent; }
  .empty { text-align: center; color: #8fa0c2; padding: 80px 0; font-size: 16px; }
  .chip[style*="--chip-on-bg"][data-on="true"] { background: var(--chip-on-bg); }
  .compare-bar { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; background: rgba(8,18,42,.96); border: 1px solid rgba(216,167,42,.45); border-radius: 50px; padding: 10px 18px; box-shadow: 0 8px 30px -6px rgba(0,0,0,.65); backdrop-filter: blur(14px); z-index: 50; animation: compare-bar-in .3s cubic-bezier(.2,.8,.25,1); }
  @keyframes compare-bar-in { from { opacity: 0; transform: translateX(-50%) translateY(16px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  .compare-bar-count { font-size: 13px; font-weight: 600; color: #e9eefb; }
  .compare-bar-go { font-family: 'Anton', sans-serif; font-size: 13px; letter-spacing: .5px; text-transform: uppercase; background: linear-gradient(180deg, var(--gold-lt), var(--gold)); color: #0a1730; border: none; border-radius: 999px; padding: 7px 18px; cursor: pointer; box-shadow: 0 2px 8px rgba(216,167,42,.4); }
  .compare-bar-go:hover { filter: brightness(1.08); }
  .compare-bar-clear { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.06); color: #9fb0d0; cursor: pointer; font-size: 12px; display: grid; place-items: center; }
  .compare-bar-clear:hover { background: rgba(255,255,255,.14); color: #fff; }
  .cmp-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(4,10,24,.88); backdrop-filter: blur(10px); overflow-y: auto; display: flex; align-items: flex-start; justify-content: center; padding: 40px 20px 60px; animation: fade-in .2s ease; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .cmp-modal { position: relative; width: 100%; max-width: 1100px; background: linear-gradient(160deg, #12203a, #0a1528); border: 1px solid rgba(255,255,255,.12); border-radius: 20px; padding: 36px 32px 40px; box-shadow: 0 30px 80px -20px rgba(0,0,0,.85); animation: modal-in .3s cubic-bezier(.2,.8,.25,1); }
  @keyframes modal-in { from { opacity: 0; transform: scale(.96) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .cmp-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); color: #b9c6e2; cursor: pointer; font-size: 14px; display: grid; place-items: center; }
  .cmp-close:hover { background: rgba(255,255,255,.16); color: #fff; }
  .cmp-title { font-family: 'Anton', sans-serif; font-size: 28px; text-transform: uppercase; margin: 0 0 24px; color: #e9eefb; }
  .cmp-title em { font-style: normal; color: var(--gold-lt); }
  .cmp-cards { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
  .cmp-card-wrap { flex: 0 0 auto; }
  .cmp-table-wrap { overflow-x: auto; border: 1px solid rgba(255,255,255,.1); border-radius: 12px; background: rgba(0,0,0,.2); }
  .cmp-table { width: 100%; border-collapse: collapse; font-family: 'Oswald', sans-serif; }
  .cmp-table th { padding: 10px 16px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: #8fa0c2; border-bottom: 1px solid rgba(255,255,255,.1); text-align: left; }
  .cmp-table td { padding: 9px 16px; font-size: 14px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,.06); color: #c3d0ea; }
  .cmp-stat-lbl { color: #8fa0c2; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .cmp-best { color: var(--gold-lt) !important; }
  .cmp-ovr-row td { border-top: 1px solid rgba(255,255,255,.12); color: #e9eefb; font-size: 16px; }
  .footer-note { margin-top: 50px; text-align: center; color: #66769a; font-size: 12px; line-height: 1.6; }
  .footer-note code { background: rgba(255,255,255,.07); padding: 1px 6px; border-radius: 4px; color: #b9c6e2; }
</style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="agent_feed_data.js"></script>
