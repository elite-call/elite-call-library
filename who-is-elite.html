document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

elative;z-index:1}\n    .tbrand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}\n    .tbrand img{height:22px;object-fit:contain;opacity:.9}\n    .tbrand-div{width:1px;height:20px;background:rgba(80,160,220,.25)}\n    .tbrand-name{font-family:'Anton';font-size:16px;letter-spacing:.5px;text-transform:uppercase;color:#1a3060}\n    .tbrand-name em{font-style:normal;color:#c88010}\n    .tnav{display:flex;gap:3px}\n    .tnav a{font-family:'Nunito';font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.8px;\n      padding:6px 13px;border-radius:20px;color:#4a7090;transition:background .15s,color .15s;text-decoration:none}\n    .tnav a.active{background:linear-gradient(160deg,rgba(242,200,64,.92),rgba(200,128,16,.88));\n      color:#5a2a00;box-shadow:0 2px 10px rgba(200,128,16,.35),inset 0 1px 0 rgba(255,255,255,.6)}\n    .tnav a:not(.active):hover{background:rgba(255,255,255,.6);color:#1a4a80}\n    .tspacer{flex:1}\n    .backlink{font-family:'Nunito';font-weight:800;font-size:11px;letter-spacing:.6px;text-transform:uppercase;\n      padding:8px 16px;border-radius:999px;border:1px solid rgba(160,205,245,.55);\n      background:rgba(255,255,255,.65);color:#2a4a6e;cursor:pointer;white-space:nowrap;\n      text-decoration:none;display:inline-flex;align-items:center;gap:6px;\n      box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}\n    .backlink:hover{background:rgba(255,255,255,.85);color:#1a3060}\n\n    /* ── Layout ── */\n    .wrap{max-width:1100px;margin:0 auto;padding:0 26px 90px;position:relative;z-index:1}\n\n    /* ── Hero ── */\n    .hero{padding:40px 0 28px}\n    .wordmark{font-family:'Anton';font-size:clamp(34px,6.4vw,68px);line-height:.9;margin:0;text-transform:uppercase;letter-spacing:.5px;\n      background:linear-gradient(160deg,#1a3a6a 0%,#1a60cc 45%,#2a90e0 100%);\n      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n    .wordmark em{font-style:normal;\n      background:linear-gradient(160deg,#f2c840,#c88010);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n    .headrow{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-top:22px;flex-wrap:wrap}\n\n    /* ── Section label ── */\n    .sect{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:#c88010;margin-bottom:10px;font-weight:800}\n    .sect.cobalt{color:#1a60cc}\n    .sect-row{display:flex;align-items:center;gap:14px;margin:28px 0 10px}\n    .sect-row .sect{margin-bottom:0}\n    .sect-rule{flex:1;height:1px;background:linear-gradient(90deg,rgba(160,205,245,.4),transparent)}\n\n    /* ── Full-width GC card (Identity, Culture) ── */\n    .gc-card{border-radius:16px;overflow:hidden;\n      background:\n        radial-gradient(ellipse 80% 50% at 38% 16%, rgba(255,255,255,.55) 0%, transparent 52%),\n        linear-gradient(165deg,#c8e8f8 0%,#a0d4f0 30%,#78b8e8 65%,#5090c8 100%);\n      border:1px solid rgba(255,255,255,.85);\n      box-shadow:0 18px 44px -10px rgba(40,100,180,.32),0 4px 12px rgba(0,0,0,.09),inset 0 2px 0 rgba(255,255,255,.9);\n      margin-bottom:0}\n    .gc-card.mint{\n      background:\n        radial-gradient(ellipse 80% 50% at 38% 16%, rgba(255,255,255,.55) 0%, transparent 52%),\n        linear-gradient(165deg,#b8f0d8 0%,#88ddb8 30%,#58c898 65%,#38a878 100%)}\n    .gc-inner{margin:10px;border:1px solid rgba(255,255,255,.65);border-radius:11px;padding:22px 26px;\n      display:flex;flex-direction:column;gap:14px;\n      background:linear-gradient(180deg,rgba(255,255,255,.38),rgba(255,255,255,.14))}\n\n    /* ── Key quote ── */\n    .key-quote{\n      background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(220,240,255,.55));\n      border-radius:10px;border:1px solid rgba(255,255,255,.72);\n      padding:18px 22px;\n      box-shadow:inset 0 1px 0 rgba(255,255,255,.95);\n      font-size:15.5px;font-weight:700;line-height:1.6;color:#1a3060;\n      text-align:center}\n    .body-lead{font-size:15px;font-weight:700;line-height:1.6;color:#1a3060}\n    .body-text{font-size:14px;font-weight:600;line-height:1.68;color:#2a4a6e}\n\n    /* ── Stat row ── */\n    .stat-row{display:grid;grid-template-columns:1fr 1fr;border-radius:16px;overflow:hidden;\n      border:1px solid rgba(255,255,255,.85);\n      box-shadow:0 18px 44px -10px rgba(40,100,180,.32),0 4px 12px rgba(0,0,0,.09),inset 0 2px 0 rgba(255,255,255,.9)}\n    .stat-r{\n      padding:30px 24px 26px;text-align:center;\n      background:\n        radial-gradient(ellipse 80% 50% at 38% 16%, rgba(255,255,255,.45) 0%, transparent 52%),\n        linear-gradient(165deg,#d8f0fc 0%,#b8e0f5 40%,#98c8ec 100%);\n      border-right:1px solid rgba(255,255,255,.55)}\n    .stat-r:last-child{border-right:none}\n    .stat-r .n{font-family:'Anton';font-size:64px;color:#1a60cc;line-height:.9;display:block}\n    .stat-r .l{font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:#6a90b8;margin-top:8px;font-weight:800;display:block}\n    .stat-r .sub{font-size:11px;font-weight:700;color:#4a7090;margin-top:5px;display:block;letter-spacing:.2px}\n    /* Patriot cell — flag bg + frosted overlay */\n    .patriot-cell{\n      position:relative;\n      background-image:url(\"111064fb-bf4a-4dcb-b028-b2484d9152d5\");\n      background-size:cover;background-position:center;\n      overflow:hidden}\n    .patriot-cell::before{\n      content:'';position:absolute;inset:0;\n      background:rgba(255,255,255,.38);\n      backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px)}\n    .patriot-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:30px 24px 26px}\n    .patriot-title{font-family:'Anton';font-size:22px;letter-spacing:.5px;text-transform:uppercase;line-height:1.1;\n      color:#0a3161;text-shadow:0 1px 3px rgba(255,255,255,.8);display:block;margin-bottom:6px}\n    .patriot-badge{display:inline-flex;align-items:center;gap:5px;\n      background:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.9);\n      border-radius:999px;padding:4px 12px;\n      font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#0a3161;\n      box-shadow:0 2px 8px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.95)}\n\n    /* ── Campaign model card ── */\n    .campaign-card{border-radius:16px;overflow:hidden;\n      background:\n        radial-gradient(ellipse 80% 50% at 38% 16%, rgba(255,255,255,.55) 0%, transparent 52%),\n        linear-gradient(165deg,#c8e8f8 0%,#a0d4f0 30%,#78b8e8 65%,#5090c8 100%);\n      border:1px solid rgba(255,255,255,.85);\n      box-shadow:0 18px 44px -10px rgba(40,100,180,.32),0 4px 12px rgba(0,0,0,.09),inset 0 2px 0 rgba(255,255,255,.9)}\n    .tiles{display:grid;grid-template-columns:repeat(3,1fr)}\n    .tile{background:linear-gradient(180deg,rgba(255,255,255,.68),rgba(210,235,255,.45));\n      padding:20px 22px;border-right:1px solid rgba(255,255,255,.55)}\n    .tile:first-child{border-radius:0}\n    .tile:last-child{border-right:none}\n    .tile .tile-sect{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:#c88010;font-weight:800;margin-bottom:8px}\n    .tile h3{font-family:'Anton';font-size:16px;color:#1a3060;margin-bottom:8px;letter-spacing:.3px}\n    .tile p{font-size:13px;font-weight:600;line-height:1.6;color:#2a4a6e}\n    .tile-sep{height:1px;background:rgba(255,255,255,.55)}\n    .campaign-footer{padding:15px 22px;font-size:13px;font-weight:600;line-height:1.68;color:#2a4a6e;\n      background:linear-gradient(180deg,rgba(255,255,255,.3),rgba(255,255,255,.12))}\n\n    /* ── Amber inline links ── */\n    .call a{color:#c88010;text-decoration:none;border:1px solid rgba(200,128,16,.4);border-radius:5px;padding:2px 8px;\n      font-size:12px;font-weight:800;text-transform:uppercase;white-space:nowrap}\n    .call a:hover{background:rgba(200,128,16,.1)}\n\n    /* ── Culture list ── */\n    .culture-list{list-style:none;display:flex;flex-direction:column;gap:11px}\n    .culture-list nd\">\n      <img src=\"89decb3f-4562-499c-b8f3-b3bd27dd8a17\" alt=\"Elite Call\">\n    <\u002Fa>\n    <div class=\"tbrand-div\"><\u002Fdiv>\n    <span class=\"tbrand-name\">New Hire <em>Hub<\u002Fem><\u002Fspan>\n    <nav class=\"tnav\">\n      <a href=\"index.html\">Home<\u002Fa>\n      <a href=\"#\" class=\"active\">Who We Are<\u002Fa>\n      <a href=\"#\">Products<\u002Fa>\n      <a href=\"#\">Industry<\u002Fa>\n      <a href=\"#\">Training<\u002Fa>\n    <\u002Fnav>\n    <div class=\"tspacer\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"wrap\">\n  <div class=\"hero\">\n    <h1 class=\"wordmark\">Who is Elite <em>Call?<\u002Fem><\u002Fh1>\n    <div class=\"headrow\">\n      <a class=\"backlink\" href=\"index.html\">← New Hire Hub<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Identity -->\n  <div class=\"sect-row\"><span class=\"sect\">Identity<\u002Fspan><div class=\"sect-rule\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"gc-card\">\n    <div class=\"gc-inner\">\n      <p class=\"body-lead\">Elite Call is a fully US-owned and operated outbound call center specializing in high-end customer engagement.<\u002Fp>\n      <div class=\"key-quote\">\"We are not satisfied with average; we recognize that consumers who are not expecting our phone calls, but still take the time to talk with us, deserve an elevated experience.\"<\u002Fdiv>\n      <p class=\"body-text\">Our clients trust that when they share their databases for outbound dialing, their customers will feel appreciated and impressed with the brand.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Footprint -->\n  <div class=\"sect-row\" style=\"margin-top:32px;\"><span class=\"sect\">Footprint<\u002Fspan><div class=\"sect-rule\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"stat-row\">\n    <div class=\"stat-r patriot-cell\">\n      <div class=\"patriot-content\">\n        <span class=\"patriot-title\">US-Owned &amp;<br>Operated<\u002Fspan>\n        <span class=\"patriot-badge\">🇺🇸 Proudly American<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-r\">\n      <span class=\"n\">4<\u002Fspan>\n      <span class=\"l\">Offices Total<\u002Fspan>\n      <span class=\"sub\">3 Chicago Suburbs · 1 Naples, FL<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Campaign Model -->\n  <div class=\"sect-row\" style=\"margin-top:32px;\"><span class=\"sect\">How We Work<\u002Fspan><div class=\"sect-rule\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"campaign-card\">\n    <div class=\"tiles\">\n      <div class=\"tile\">\n        <div class=\"tile-sect\">How They Pay<\u002Fdiv>\n        <h3>Per Record · Per Appointment<\u002Fh3>\n        <p>Clients choose the billing model that fits the campaign — pricing tied directly to the work, not the clock.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"tile\">\n        <div class=\"tile-sect\">Who We Dial<\u002Fdiv>\n        <h3>Internal CRM or Cold Outreach<\u002Fh3>\n        <p>The client's own database, segmented any way they choose — or cold calling at client request. We work their list, their way.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"tile call\">\n        <div class=\"tile-sect\">What We Offer<\u002Fdiv>\n        <h3>Results That Move the Needle<\u002Fh3>\n        <p>Fill boards with maintenance, boost <a href=\"#\">membership enrollments<\u002Fa>, sell new equipment, <a href=\"#\">close open estimates<\u002Fa>, and more.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tile-sep\"><\u002Fdiv>\n    <div class=\"campaign-footer call\">\n      Campaigns are boutique — built per client, open to any industry, B2B or residential. HVAC and Garage Door service providers (often including plumbing and electrical) are Elite Call's current <a href=\"#\">wheelhouse<\u002Fa>.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Culture -->\n  <div class=\"sect-row\" style=\"margin-top:32px;\"><span class=\"sect cobalt\">Culture<\u002Fspan><div class=\"sect-rule\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"gc-card mint\">\n    <div class=\"gc-inner\">\n      <p class=\"body-lead\">A dynamic culture that rewards self-improvement and personal integrity — where the work is serious, but the people take care of each other.<\u002Fp>\n      <ul class=\"culture-list\">\n        <li>Regular company events throughout the year — games, prizes, food, and reasons to celebrate together.<\u002Fli>\n        <li>Weekly Employee Experience meetings bring leadership and outbound agents into real conversation: dialing skills, agent needs, and long-term career growth.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- What You Get -->\n  <div class=\"sect-row\" style=\"margin-top:32px;\"><span class=\"sect\">What You Get<\u002Fspan><div class=\"sect-rule\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"amber-card\">\n    <div class=\"gc-inner\">\n      <p class=\"body-lead\" style=\"color:#5a2a00;\">The job comes with real upside — here's what's on the table from day one.<\u002Fp>\n      <div class=\"benefit-grid\">\n        <span class=\"benefit-chip\">Bonus on Every Lead<\u002Fspan>\n        <span class=\"benefit-chip\">Schedule Flexibility<\u002Fspan>\n        <span class=\"benefit-chip\">Career Opportunities<\u002Fspan>\n        <span class=\"benefit-chip\">Insurance<\u002Fspan>\n        <span class=\"benefit-chip\">401K Eligibility<\u002Fspan>\n        <span class=\"benefit-chip benefit-more\">&amp; More<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
