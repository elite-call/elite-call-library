<div id="app"></div>
<script>
// ── STATE ────────────────────────────────────────────────────────────────────

const S = {
  step: 'upload',
  client: '', campaign: '', date: '',
  notes: 'Prepared for internal reference ahead of sending recordings to the client.',
  calls: [], results: [], patterns: [],
  progress: { current: 0, total: 0, label: '' },
  error: null,
};

function setState(patch) {
  Object.assign(S, patch);
  render();
}

// ── UTILITIES ────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtRep(raw) {
  if (!raw) return '';
  return raw.includes(',') ? raw.split(',').reverse().map(p => p.trim()).join(' ') : raw;
}

const STATUS = {
  share:   { color: '#15803d', infoBg: '#f0fdf4', summaryBg: '#f0fdf4', label: 'Share As-Is' },
  solid:   { color: '#1a4fd8', infoBg: '#f8faff', summaryBg: '#f0f9ff', label: 'Solid' },
  review:  { color: '#b45309', infoBg: '#fffbeb', summaryBg: '#fffbeb', label: 'Review First' },
  caution: { color: '#b91c1c', infoBg: '#fff5f5', summaryBg: '#fff5f5', label: '⚠ Caution' },
};

// ── CSV PARSER ───────────────────────────────────────────────────────────────

function parseCSVRow(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += ch;
  }
  result.push(cur);
  return result;
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) throw new Error('CSV must have a header row and at least one data row.');
  const headers = parseCSVRow(lines[0]).map(h => h.trim().replace(/^\uFEFF/, ''));
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = parseCSVRow(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] ?? '').trim(); });
    return obj;
  });
}

// ── CLAUDE PROXY ─────────────────────────────────────────────────────────────

async function callClaude(params) {
  const body = typeof params === 'string'
    ? { messages: [{ role: 'user', content: params }], model: 'claude-haiku-4-5', max_tokens: 1024 }
    : params;
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(() => ({ error: 'Non-JSON response from server' }));
  if (!res.ok) throw new Error(data.error?.message || data.error || `Request failed (${res.status})`);
  return data.text;
}

// ── ANALYSIS ─────────────────────────────────────────────────────────────────

async function analyzeCall(call) {
  const repRaw   = call.Rep || call.rep || '';
  const phone    = call['Primary Phone'] || call.Phone || call.phone || '';
  const callType = call['Call Status'] || call['Call Type'] || '';
  const transcript = call.Transcript || call.transcript || '';

  const prompt = `You are an expert call center QA analyst. Analyze this call and return ONLY a JSON object — no markdown, no explanation.

Rep: ${repRaw}
Phone: ${phone}
Call Type: ${callType}
Transcript:
${transcript}

Return this exact JSON shape:
{
  "customer": "Name and context, e.g. 'Jane Smith (sole decision-maker)'",
  "address": "service address or empty string",
  "booked": "appointment date/time or empty string",
  "status": "share" | "solid" | "review" | "caution",
  "positives": ["specific observation", "..."],
  "concerns": ["specific concern", "..."],
  "summary": "1-2 sentence overall assessment"
}

Status guide:
- share: Clean, tight execution — ready to send to client as-is
- solid: Good call, presentable, minor notes only
- review: Good outcome but rough delivery or missing steps — listen before sharing
- caution: Red flags — rebuttal on a sales opp, major confusion, compliance issue`;

  const raw = await callClaude({
    model: 'claude-sonnet-4-5',
    max_tokens: 1024,
    messages: [{ role: 'user', content: prompt }],
  });

  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error(`Could not parse AI response for: ${repRaw}`);
  const parsed = JSON.parse(match[0]);
  const meta = STATUS[parsed.status] || STATUS.solid;

  return {
    ...parsed,
    statusLabel: meta.label,
    color: meta.color,
    infoBg: meta.infoBg,
    summaryBg: meta.summaryBg,
    rep: repRaw,
    repName: fmtRep(repRaw),
    phone,
    callType: callType.replace(/^HS\s*[-–]\s*/i, 'HS '),
    driveLink: call['Drive Link'] || call['drive_link'] || call['Drive link'] || call['DriveLink'] || '',
  };
}

async function analyzePatterns(results) {
  const summary = results.map((r, i) =>
    `Call ${i+1} (${r.repName}, ${r.callType}): ${r.summary} Positives: ${(r.positives||[]).join('; ')}. Concerns: ${(r.concerns||[]).join('; ')}.`
  ).join('\n\n');

  const raw = await callClaude({
    model: 'claude-sonnet-4-5',
    max_tokens: 700,
    messages: [{ role: 'user', content: `You are a call center QA analyst. Identify 2-4 cross-call coaching opportunities. Return ONLY a JSON array (no markdown):\n[{"title":"Pattern Name","description":"2-3 sentence observation and recommendation"},...]\n\n${summary}` }],
  });

  const match = raw.match(/\[[\s\S]*\]/);
  return match ? JSON.parse(match[0]) : [];
}

// ── FILE HANDLING ─────────────────────────────────────────────────────────────

async function handleFile(file) {
  try {
    const text = await file.text();
    const calls = parseCSV(text);
    const first = calls[0] || {};
    // Update state but DON'T re-render yet — just update calls + auto-fill from CSV cols
    S.calls = calls;
    if (first.Client || first.client) S.client = first.Client || first.client;
    if (first.Campaign || first.campaign || first['Campaign Name']) S.campaign = first.Campaign || first.campaign || first['Campaign Name'];
    if (first.Date || first.date) S.date = first.Date || first.date;
    S.error = null;
    render(); // re-render once after parsing
  } catch (e) {
    setState({ error: e.message });
  }
}

// ── GENERATE ─────────────────────────────────────────────────────────────────

async function generate() {
  if (!S.calls.length) return;
  if (!S.client.trim()) { setState({ error: 'Please enter a Client Name before generating.' }); return; }

  setState({ step: 'processing', error: null, progress: { current: 0, total: S.calls.length + 1, label: 'Starting analysis…' } });

  try {
    const results = [];
    for (let i = 0; i < S.calls.length; i++) {
      S.progress = { current: i, total: S.calls.length + 1, label: `Analyzing call ${i+1} of ${S.calls.length} — ${fmtRep(S.calls[i].Rep || '')}…` };
      document.getElementById('prog-bar') && (document.getElementById('prog-bar').style.width = Math.round(i / (S.calls.length + 1) * 100) + '%');
      document.getElementById('prog-label') && (document.getElementById('prog-label').textContent = S.progress.label);
      document.getElementById('prog-pct') && (document.getElementById('prog-pct').textContent = Math.round(i / (S.calls.length + 1) * 100) + '% complete');
      results.push(await analyzeCall(S.calls[i]));
    }

    S.progress = { current: S.calls.length, total: S.calls.length + 1, label: 'Identifying cross-call patterns…' };
    document.getElementById('prog-label') && (document.getElementById('prog-label').textContent = S.progress.label);
    const patterns = await analyzePatterns(results);

    setState({ step: 'report', results, patterns });
  } catch (e) {
    setState({ step: 'upload', error: e.message });
  }
}

</div>

<!-- Report -->
<div class="report-wrap" style="max-width:860px;margin:0 auto;padding:40px 32px 64px;">

  <!-- Print header -->
  <div class="print-only" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:2px solid #1a4fd8;margin-bottom:32px;">
    <img src="./uploads/emblem_horizontal_signature.png" style="height:22px;" alt="Elite Call">
    <span style="font-size:10px;font-weight:600;color:#64748b;letter-spacing:.08em;text-transform:uppercase;">${esc(title)}</span>
  </div>

  <!-- Cover -->
  <div style="background:#0d1b2a;border-radius:12px;padding:36px 40px 32px;margin-bottom:36px;position:relative;overflow:hidden;">
    <div style="position:absolute;top:-30px;right:-30px;width:200px;height:200px;border-radius:50%;background:rgba(26,79,216,.18);pointer-events:none;"></div>
    <div style="position:absolute;bottom:-50px;right:60px;width:120px;height:120px;border-radius:50%;background:rgba(26,79,216,.10);pointer-events:none;"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;position:relative;gap:16px;">
      <div>
        <div style="display:inline-block;background:#1a4fd8;color:#fff;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:14px;">QA Call Review</div>
        <h1 style="color:#fff;font-size:28px;font-weight:800;margin:0 0 6px;line-height:1.2;">${esc(client)}</h1>
        <p style="color:#94a3b8;font-size:14px;font-weight:500;margin:0 0 4px;">${esc(subtitle)}</p>
        <p style="color:#64748b;font-size:12px;font-weight:400;margin:0;font-style:italic;">${esc(notes)}</p>
      </div>
      <img src="./uploads/emblem_horizontal_signature.png" style="height:28px;opacity:.55;margin-top:4px;flex-shrink:0;" alt="Elite Call">
    </div>
    <div style="display:flex;gap:16px;margin-top:28px;position:relative;flex-wrap:wrap;">
      <div style="background:rgba(255,255,255,.07);border-radius:8px;padding:12px 18px;flex:1;min-width:80px;">
        <div style="color:#94a3b8;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;">Calls</div>
        <div style="color:#fff;font-size:22px;font-weight:800;">${results.length}</div>
      </div>
      <div style="background:rgba(255,255,255,.07);border-radius:8px;padding:12px 18px;flex:1;min-width:80px;">
        <div style="color:#94a3b8;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;">Agents</div>
        <div style="color:#fff;font-size:22px;font-weight:800;">${agents}</div>
      </div>
      <div style="background:rgba(255,255,255,.07);border-radius:8px;padding:12px 18px;flex:1;min-width:80px;">
        <div style="color:#94a3b8;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;">Share Ready</div>
        <div style="color:#4ade80;font-size:22px;font-weight:800;">${shareReady} / ${results.length}</div>
      </div>
      <div style="background:rgba(255,255,255,.07);border-radius:8px;padding:12px 18px;flex:1;min-width:80px;">
        <div style="color:#94a3b8;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;">Flagged</div>
        <div style="color:#fb923c;font-size:22px;font-weight:800;">${flagged}</div>
      </div>
    </div>
  </div>

  ${cards}

  <!-- Cross-call patterns -->
  <div style="background:#0d1b2a;border-radius:12px;padding:28px 32px;break-inside:avoid;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
      <div style="width:30px;height:30px;background:#1a4fd8;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="color:#fff;font-size:13px;font-weight:800;">!</span>
      </div>
      <h2 style="color:#fff;font-size:15px;font-weight:800;margin:0;">Cross-Call Patterns to Note</h2>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">${patternCards}</div>
  </div>
</div>`;
}

// ── RENDER + EVENT BINDING ────────────────────────────────────────────────────

function render() {
  const app = document.getElementById('app');
  if (S.step === 'upload')      app.innerHTML = uploadHTML();
  else if (S.step === 'processing') app.innerHTML = processingHTML();
  else if (S.step === 'report') app.innerHTML = reportHTML();
  bindEvents();
}

function bindEvents() {
  if (S.step === 'upload') {
    const fileInput = document.getElementById('file-input');
    const dropZone  = document.getElementById('drop-zone');
    const btnGen    = document.getElementById('btn-generate');

    if (fileInput) fileInput.addEventListener('change', e => { const f = e.target.files[0]; if (f) handleFile(f); });

    if (dropZone) {
      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor='#1a4fd8'; dropZone.style.background='#f0f4ff'; });
      dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor='#cbd5e1'; dropZone.style.background=''; });
      dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.style.borderColor='#cbd5e1'; dropZone.style.background=''; const f=e.dataTransfer.files[0]; if(f) handleFile(f); });
    }

    if (btnGen) btnGen.addEventListener('click', generate);

    // Live field updates — no re-render, just update state
    const fields = { 'inp-client':'client', 'inp-campaign':'campaign', 'inp-date':'date', 'inp-notes':'notes' };
    Object.entries(fields).forEach(([id, key]) => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', e => { S[key] = e.target.value; });
    });
  }

  if (S.step === 'report') {
    const btnReset = document.getElementById('btn-reset');
    if (btnReset) btnReset.addEventListener('click', () => setState({ step:'upload', calls:[], results:[], patterns:[], error:null }));
  }
}

// Init
render();
</script>
</body>
</html>
